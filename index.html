<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOLI - Multiplayer NES</title>
    <!-- JSNES Library for NES Emulation -->
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root {
            --primary: #9b59b6;
            --secondary: #3498db;
            --accent: #e74c3c;
            --bg-dark: #1a1a1a;
            --text-light: #ecf0f1;
            --retro-green: #2ecc71;
            --crt-scanline: rgba(18, 16, 16, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        .btn {
            background: var(--primary);
            color: white;
            border: 4px solid #8e44ad;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #6c3483;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 10px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6c3483;
        }
        .btn-secondary {
            background: var(--secondary);
            border-color: #2980b9;
            box-shadow: 0 6px 0 #1f618d;
        }
        .btn-secondary:active { box-shadow: 0 2px 0 #1f618d; }

        input {
            background: #333;
            border: 2px solid #555;
            color: white;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .jojoli-title {
            font-size: 5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 4px 4px 0px var(--secondary);
            opacity: 0;
            transform: scale(0.5);
            animation: introPop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes introPop {
            0% { opacity: 0; transform: scale(0.5); }
            70% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- MAIN MENU --- */
        #menu-screen {
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease;
        }

        .card {
            background: #2c3e50;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        }

        .logo-small {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: inline-block;
        }

        /* --- GAME ROOM / LOBBY --- */
        #room-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }

        .player-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #555;
            box-shadow: 0 0 5px #000;
        }
        .indicator.online { background-color: var(--retro-green); box-shadow: 0 0 8px var(--retro-green); }
        .indicator.offline { background-color: var(--accent); }

        .game-container {
            position: relative;
            border: 10px solid #444;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: black;
            max-width: 100%;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 70vh;
        }

        /* CRT Overlay Effect */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
        }

        .key {
            display: inline-block;
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            color: white;
            margin: 0 2px;
            border-bottom: 2px solid #222;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--retro-green);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2000;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<!-- INTRO SCREEN -->
<div id="intro-screen">
    <div class="jojoli-title">JOJOLI</div>
</div>

<!-- MENU SCREEN -->
<div id="menu-screen" class="hidden">
    <div class="card">
        <div class="logo-small">JOJOLI</div>
        <p>Multiplayer NES Experience</p>
        <hr style="border: 0; border-top: 1px solid #555; margin: 20px 0;">

        <button class="btn" onclick="app.createRoom()">Create Room</button>

        <div style="margin: 20px 0;">OR</div>

        <input type="text" id="join-code-input" placeholder="Enter Friend's Code" maxlength="6" style="width: 150px; text-transform: uppercase;">
        <button class="btn btn-secondary" onclick="app.joinRoom()">Join Room</button>
    </div>
</div>

<!-- LOBBY / GAME SCREEN -->
<div id="room-screen" class="hidden">
    <div class="status-bar">
        <div class="player-status">
            <div id="p1-indicator" class="indicator online"></div>
            <span>YOU (P1)</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <span id="room-code-display" style="font-size: 1.2rem; color: var(--secondary); letter-spacing: 2px;"></span>
            <span style="font-size: 0.7rem; color: #777;">ROOM CODE</span>
        </div>
        <div class="player-status">
            <span id="p2-label">FRIEND (P2)</span>
            <div id="p2-indicator" class="indicator offline"></div>
        </div>
    </div>

    <div id="lobby-controls" class="card hidden" style="margin-bottom: 20px;">
        <h3>Room Created!</h3>
        <p>Share the code above with your friend.</p>
        <p>Once they join, upload your ROM.</p>
        <input type="file" id="rom-upload" accept=".nes" style="display:none" onchange="app.handleRomUpload(this)">
        <button class="btn" onclick="document.getElementById('rom-upload').click()">Upload NES ROM</button>
    </div>

    <div id="game-area" class="game-container hidden crt">
        <canvas id="nes-canvas" width="256" height="240"></canvas>
    </div>

    <div id="controls-info" class="controls-hint hidden">
        <strong>P1 (You):</strong> <span class="key">Arrows</span> Move <span class="key">Z</span> A <span class="key">X</span> B <span class="key">Enter</span> Start |
        <strong>P2 (Friend):</strong> <span class="key">WASD</span> Move <span class="key">F</span> A <span class="key">G</span> B <span class="key">H</span> Start
    </div>
</div>

<!-- TOAST MSG -->
<div id="toast">Message</div>

<script>
    /**
     * JOJOLI Application Logic
     * Handles Intro, Room Management (via BroadcastChannel), and NES Emulation.
     */

    const CHANNEL_NAME = 'jojoli_net_v1';

    class JojoliApp {
        constructor() {
            this.screen = 'intro';
            this.roomCode = null;
            this.isHost = false;
            this.nes = null;
            this.canvas = null;
            this.ctx = null;
            this.networkChannel = new BroadcastChannel(CHANNEL_NAME);
            this.romData = null;
            this.frameId = null;
            this.p2Connected = false;

            // Input state tracking
            this.keys = {};
            this.p2Keys = {}; // Received from network

            this.initListeners();
            this.runIntro();
        }

        // --- NAVIGATION & INTRO ---

        runIntro() {
            // Play sound
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance("Hello Jojoli");
                utterance.rate = 1;
                utterance.pitch = 1.2;
                setTimeout(() => window.speechSynthesis.speak(utterance), 800);
            }

            // Switch to menu after animation
            setTimeout(() => {
                document.getElementById('intro-screen').classList.add('hidden');
                document.getElementById('menu-screen').classList.remove('hidden');
                this.screen = 'menu';
            }, 3500);
        }

        switchScreen(screenId) {
            document.querySelectorAll('body > div').forEach(el => {
                if(el.id !== 'toast') el.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            this.screen = screenId;
        }

        showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        // --- ROOM LOGIC ---

        generateCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        createRoom() {
            this.isHost = true;
            this.roomCode = this.generateCode();
            this.setupRoomUI();
            this.showToast("Room Created! Share the code.");

            // Host listens for join requests
            this.networkChannel.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'JOIN_REQUEST' && data.code === this.roomCode) {
                    // P2 Joined
                    this.p2Connected = true;
                    this.updateP2Status(true);
                    this.networkChannel.postMessage({ type: 'JOIN_ACCEPT' });
                    this.showToast("Friend connected!");

                    // If game is already running, P2 needs ROM
                    if (this.romData) {
                        this.networkChannel.postMessage({
                            type: 'ROM_DATA',
                            rom: this.romData
                        });
                        this.startGameLoop(); // Ensure loop is running
                    }
                }
            };
        }

        joinRoom() {
            const code = document.getElementById('join-code-input').value.trim().toUpperCase();
            if (!code) {
                this.showToast("Please enter a code");
                return;
            }

            this.isHost = false;
            this.roomCode = code;
            this.setupRoomUI();

            // Client Logic
            document.getElementById('p1-indicator').classList.remove('online'); // We don't know about P1 yet
            document.getElementById('p2-indicator').classList.add('online'); // We are P2 visually, but logic handles it

            this.networkChannel.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'JOIN_ACCEPT') {
                    this.showToast("Connected to Host!");
                    this.updateP1Status(true);
                } else if (data.type === 'ROM_DATA') {
                    this.romData = data.rom;
                    this.initEmulator(this.romData);
                    this.showToast("ROM Received. Starting game...");
                    this.startGameLoop(); // Client renders what host sends (conceptually)
                } else if (data.type === 'INPUT_FRAME') {
                    // Host sends inputs
                    this.p2Keys = data.p2Keys; // Use inputs from Host
                    this.handleNetworkInput(data.p1Keys, data.p2Keys);
                } else if (data.type === 'FRAME_BUFFER') {
                     // Experimental: Streaming video frame from Host
                     this.drawFrame(data.imageBitmap);
                }
            };

            // Request Join
            this.networkChannel.postMessage({ type: 'JOIN_REQUEST', code: this.roomCode });
        }

        setupRoomUI() {
            this.switchScreen('room-screen');
            document.getElementById('room-code-display').innerText = this.roomCode;

            if (this.isHost) {
                document.getElementById('lobby-controls').classList.remove('hidden');
                document.getElementById('p1-indicator').classList.add('online');
            } else {
                document.getElementById('lobby-controls').classList.add('hidden');
                document.getElementById('p2-label').innerText = "YOU (P2)";
                document.getElementById('p2-indicator').classList.add('online');
            }
        }

        updateP2Status(isOnline) {
            const el = document.getElementById('p2-indicator');
            if (isOnline) el.classList.add('online');
            else el.classList.remove('online');
        }

        updateP1Status(isOnline) {
            const el = document.getElementById('p1-indicator');
            if (isOnline) el.classList.add('online');
            else el.classList.remove('online');
        }

        // --- GAME LOGIC ---

        handleRomUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                this.romData = e.target.result;
                this.initEmulator(this.romData);

                // Send ROM to P2 if connected
                if (this.p2Connected) {
                    this.networkChannel.postMessage({ type: 'ROM_DATA', rom: this.romData });
                }
            };
            reader.readAsArrayBuffer(file);
        }

        initEmulator(romData) {
            this.canvas = document.getElementById('nes-canvas');
            this.ctx = this.canvas.getContext('2d');

            // Image Data buffer for rendering
            this.imageData = this.ctx.createImageData(256, 240);

            this.nes = new jsnes.NES({
                onFrame: (buffer) => {
                    const data = this.imageData.data;
                    for (let i = 0; i < buffer.length; i++) {
                        // NES buffer is RGBA (int32), ImageData is R,G,B,A bytes
                        const pixel = buffer[i];
                        data[i * 4] = pixel & 0xFF;
                        data[i * 4 + 1] = (pixel >> 8) & 0xFF;
                        data[i * 4 + 2] = (pixel >> 16) & 0xFF;
                        data[i * 4 + 3] = 0xFF; // Alpha
                    }
                    this.ctx.putImageData(this.imageData, 0, 0);
                },
                onAudioSample: (left, right) => {
                    // Audio handling is complex in browser without user gesture context management.
                    // For this demo, we focus on video sync.
                }
            });

            this.nes.loadROM(romData);

            document.getElementById('lobby-controls').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('controls-info').classList.remove('hidden');

            if(this.isHost) {
                this.startGameLoop();
            }
        }

        // --- INPUT MAPPING ---

        // Standard Map
        mapKey(key, player) {
            // Player 1
            if (player === 1) {
                if (key === 'ArrowLeft') return jsnes.Controller.BUTTON_LEFT;
                if (key === 'ArrowRight') return jsnes.Controller.BUTTON_RIGHT;
                if (key === 'ArrowUp') return jsnes.Controller.BUTTON_UP;
                if (key === 'ArrowDown') return jsnes.Controller.BUTTON_DOWN;
                if (key === 'z') return jsnes.Controller.BUTTON_A;
                if (key === 'x') return jsnes.Controller.BUTTON_B;
                if (key === 'Enter') return jsnes.Controller.BUTTON_START;
                if (key === 'Shift') return jsnes.Controller.BUTTON_SELECT;
            }
            // Player 2 (Local/Network)
            if (player === 2) {
                if (key === 'a') return jsnes.Controller.BUTTON_LEFT;
                if (key === 'd') return jsnes.Controller.BUTTON_RIGHT;
                if (key === 'w') return jsnes.Controller.BUTTON_UP;
                if (key === 's') return jsnes.Controller.BUTTON_DOWN;
                if (key === 'f') return jsnes.Controller.BUTTON_A;
                if (key === 'g') return jsnes.Controller.BUTTON_B;
                if (key === 'h') return jsnes.Controller.BUTTON_START;
                if (key === 'j') return jsnes.Controller.BUTTON_SELECT;
            }
            return null;
        }

        initListeners() {
            window.addEventListener('keydown', (e) => this.handleInput(e, true));
            window.addEventListener('keyup', (e) => this.handleInput(e, false));
        }

        handleInput(e, isDown) {
            if (this.screen !== 'room-screen' || !this.nes) return;

            // Handle P1 Inputs (Always local)
            const p1Btn = this.mapKey(e.key, 1);
            if (p1Btn) {
                if (isDown) this.nes.buttonDown(1, p1Btn);
                else this.nes.buttonUp(1, p1Btn);
            }

            // Handle P2 Inputs
            // If Host: We receive P2 inputs via network OR we allow local testing
            // If Client: We send our P2 inputs to Host

            const p2Btn = this.mapKey(e.key, 2);

            if (p2Btn) {
                if (this.isHost) {
                    // Local P2 (Testing only)
                    if (isDown) this.nes.buttonDown(2, p2Btn);
                    else this.nes.buttonUp(2, p2Btn);
                } else {
                    // Client sends input to Host
                    this.networkChannel.postMessage({
                        type: 'P2_INPUT',
                        key: e.key,
                        isDown: isDown
                    });
                }
            }
        }

        // --- NETWORK SYNC LOOP (HOST SIDE) ---

        startGameLoop() {
            if (this.frameId) cancelAnimationFrame(this.frameId);

            const loop = () => {
                if (!this.nes) return;

                // Emulate Frame
                this.nes.frame();

                // If Host, sync state to Client
                if (this.isHost && this.p2Connected) {
                    // We are not sending the whole canvas (too slow for BroadcastChannel).
                    // In a real app, we'd use WebRTC DataChannel for video.
                    // Here, we trust the Client also runs the emulator, but we need to sync RNG or inputs.
                    // For this simple demo, we will capture the Frame as a Bitmap and send it.
                    // Note: createImageBitmap is async, but fast enough for local tabs.

                    createImageBitmap(this.canvas).then(bitmap => {
                        this.networkChannel.postMessage({
                            type: 'FRAME_BUFFER',
                            imageBitmap: bitmap
                        }, [bitmap]); // Transferable
                    });
                }

                this.frameId = requestAnimationFrame(loop);
            };

            this.frameId = requestAnimationFrame(loop);
        }

        // --- CLIENT RENDERER ---

        drawFrame(bitmap) {
            this.ctx.drawImage(bitmap, 0, 0);
        }

        handleNetworkInput(p1State, p2State) {
            // If we are client, we mostly just render the video.
            // But for input responsiveness, if the client presses a button,
            // the host receives it and injects it.
        }
    }

    // --- NETWORK RECEIVER FOR HOST (P2 INPUTS) ---

    // We need a global listener to catch P2 inputs if we are the host
    const network = new BroadcastChannel(CHANNEL_NAME);
    network.onmessage = (event) => {
        if (app.isHost && event.data.type === 'P2_INPUT') {
            const { key, isDown } = event.data;
            const btn = app.mapKey(key, 2);
            if (btn) {
                if (isDown) app.nes.buttonDown(2, btn);
                else app.nes.buttonUp(2, btn);
            }
        }
    };

    // Initialize App
    const app = new JojoliApp();

</script>
</body>
</html>
