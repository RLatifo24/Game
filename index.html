<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jojoli Online - PeerJS</title>
    
    <!-- 1. PEERJS LIBRARY (Required for Cross-Device Play) -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <!-- 2. Other Libraries -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg: #050505;
            --glass: rgba(0, 0, 0, 0.95);
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body {
            margin: 0; overflow: hidden; background: var(--bg);
            font-family: 'Share Tech Mono', monospace; color: white;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* 3D World */
        #world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 2D Fallback */
        #screen-container { display: none; z-index: 5; position: relative; border: 4px solid #333; background: #000; }
        canvas#nes-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        .panel {
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 20px; text-align: center;
            max-width: 95%; width: 500px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0; text-transform: uppercase; }
        
        .mode-btn {
            background: var(--neon-blue); color: black; border: none;
            padding: 15px; font-family: 'Orbitron'; font-size: 1.1rem; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .mode-btn:hover { transform: scale(1.05); }
        .mode-btn:disabled { background: #555; cursor: wait; }
        
        input {
            width: 100%; padding: 10px; background: #000; border: 1px solid #555;
            color: white; font-family: monospace; text-align: center;
        }

        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; padding: 10px 20px;
            font-family: 'Orbitron'; font-size: 0.9rem; z-index: 20;
        }

        /* Controls */
        #controls-layer {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none; z-index: 20;
        }
        @media (min-width: 1024px) { #controls-layer { display: none; } }

        .c-zone { pointer-events: auto; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .d-pad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .d-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #555;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
            cursor: pointer;
        }
        .d-btn:active, .d-btn.active { background: var(--neon-blue); color: #000; }
        .ab-btns { display: flex; gap: 20px; }
        .ab-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--neon-pink); border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }
        .ab-btn:active, .ab-btn.active { transform: scale(0.9); background: #ff99ff; }

        /* 2D Mode */
        body.mode-2d #world { display: none; }
        body.mode-2d #screen-container { display: flex; width: 90vw; height: 67.5vw; max-width: 800px; max-height: 600px; }
        
        .loading-text { color: yellow; font-size: 0.8rem; margin-top: 5px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="world"></div>
    <div id="screen-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>

    <div id="ui-layer">
        <!-- Intro -->
        <div id="intro" class="panel interactive">
            <h1>Jojoli Online</h1>
            <div id="peer-status" style="color:#aaa; font-size:0.8rem;">Connecting to PeerJS Server...</div>
            <hr style="border-color:#333">
            <button class="mode-btn" id="btn-create" onclick="app.createRoom()" disabled>CREATE ROOM</button>
            <button class="mode-btn" id="btn-join" onclick="app.showJoin()" disabled>JOIN ROOM</button>
        </div>

        <!-- Create Room -->
        <div id="create-panel" class="panel interactive hidden">
            <h1>Room Created</h1>
            <p>Send this ID to your friend:</p>
            <input type="text" id="my-id" readonly onclick="this.select()" style="font-size:1rem; cursor:pointer; color:var(--neon-blue);">
            <div id="conn-status" style="color:#aaa;">Waiting for connection...</div>
            <div id="host-controls" class="hidden">
                <hr style="border-color:#333">
                <p>1. UPLOAD ROM (.nes)</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.fileSelected(this)">
                <button class="mode-btn" onclick="document.getElementById('rom-file').click()">SELECT FILE</button>
                <div id="rom-status" class="loading-text"></div>
            </div>
        </div>

        <!-- Join Room -->
        <div id="join-panel" class="panel interactive hidden">
            <h1>Join Room</h1>
            <p>Paste Host ID:</p>
            <input type="text" id="host-id" placeholder="Paste ID Here...">
            <button class="mode-btn" onclick="app.connectToHost()">CONNECT</button>
            <div id="rom-status" class="loading-text"></div>
        </div>

        <!-- Game UI -->
        <div id="game-ui">
            <div class="status-bar">
                <span id="p1-stat">P1 (YOU)</span>
                <span style="color:#00f3ff">ONLINE</span>
                <span id="p2-stat">P2</span>
            </div>

            <div id="controls-layer">
                <div class="c-zone">
                    <div class="d-pad">
                        <div class="d-btn d-up" onmousedown="app.btn(1, 5, true)" onmouseup="app.btn(1, 5, false)" ontouchstart="app.btn(1, 5, true)" ontouchend="app.btn(1, 5, false)">▲</div>
                        <div class="d-btn d-left" onmousedown="app.btn(1, 7, true)" onmouseup="app.btn(1, 7, false)" ontouchstart="app.btn(1, 7, true)" ontouchend="app.btn(1, 7, false)">◀</div>
                        <div class="d-btn d-right" onmousedown="app.btn(1, 8, true)" onmouseup="app.btn(1, 8, false)" ontouchstart="app.btn(1, 8, true)" ontouchend="app.btn(1, 8, false)">▶</div>
                        <div class="d-btn d-down" onmousedown="app.btn(1, 6, true)" onmouseup="app.btn(1, 6, false)" ontouchstart="app.btn(1, 6, true)" ontouchend="app.btn(1, 6, false)">▼</div>
                    </div>
                    <div class="ab-btns">
                        <div class="ab-btn" style="background:#d32f2f" onmousedown="app.btn(1, 2, true)" onmouseup="app.btn(1, 2, false)" ontouchstart="app.btn(1, 2, true)" ontouchend="app.btn(1, 2, false)">B</div>
                        <div class="ab-btn" onmousedown="app.btn(1, 1, true)" onmouseup="app.btn(1, 1, false)" ontouchstart="app.btn(1, 1, true)" ontouchend="app.btn(1, 1, false)">A</div>
                    </div>
                </div>
            </div>
            <div style="position:absolute; bottom:110px; width:100%; text-align:center; color:#666; pointer-events: none;">
                P1: Arrows+ZX | P2: WASD+FG
            </div>
        </div>
    </div>

    <script>
        const C = { A:1, B:2, SEL:3, ST:4, U:5, D:6, L:7, R:8 };

        class Jojoli {
            constructor() {
                this.isHost = false;
                this.nes = null;
                this.conn = null;
                this.romData = null;
                this.screenBuffer = null;
                this.isRunning = false;

                // 1. CHECK PEERJS
                if(typeof Peer === 'undefined') {
                    alert("CRITICAL ERROR: PeerJS library failed to load.\nPlease check your Internet Connection and refresh.");
                    document.getElementById('peer-status').innerText = "ERROR: PEERJS MISSING";
                    document.getElementById('peer-status').style.color = "red";
                    return;
                }

                // 2. Init Graphics
                this.is3D = (typeof THREE !== 'undefined');
                if(!this.is3D) document.body.classList.add('mode-2d');
                this.initGraphics();

                // 3. Init PeerJS (Network)
                this.initPeerJS();

                // 4. Inputs
                window.addEventListener('keydown', e => this.key(e.key, true));
                window.addEventListener('keyup', e => this.key(e.key, false));
            }

            initGraphics() {
                const cvs = document.getElementById('nes-canvas');
                if(this.is3D) {
                    this.sc = new THREE.Scene();
                    this.cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                    this.cam.position.z = 3.5;
                    this.ren = new THREE.WebGLRenderer({ alpha: true });
                    this.ren.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('world').appendChild(this.ren.domElement);
                    this.tex = new THREE.CanvasTexture(cvs);
                    this.tex.minFilter = THREE.NearestFilter;
                    this.tex.magFilter = THREE.NearestFilter;
                    this.sc.add(new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.6), new THREE.MeshBasicMaterial({ map: this.tex })));
                    this.sc.add(new THREE.AmbientLight(1));
                    this.loop3D();
                }
            }

            loop3D() {
                requestAnimationFrame(() => this.loop3D());
                this.ren.render(this.sc, this.cam);
            }

            initPeerJS() {
                document.getElementById('peer-status').innerText = "Connecting to Server...";
                
                // Initialize Peer
                this.peer = new Peer(null, {
                    debug: 1 // Enable console logs for debugging
                });

                this.peer.on('open', (id) => {
                    console.log('My Peer ID: ' + id);
                    document.getElementById('peer-status').innerText = "Ready to Play";
                    document.getElementById('peer-status').style.color = "#0f0";
                    
                    document.getElementById('btn-create').disabled = false;
                    document.getElementById('btn-join').disabled = false;
                });

                this.peer.on('connection', (conn) => {
                    this.setupConnection(conn);
                });

                this.peer.on('error', (err) => {
                    console.error(err);
                    alert("Connection Error: " + err.type + "\nEnsure you have internet access.");
                    document.getElementById('peer-status').innerText = "Connection Error";
                });
            }

            createRoom() {
                this.isHost = true;
                document.getElementById('intro').classList.add('hidden');
                document.getElementById('create-panel').classList.remove('hidden');
                document.getElementById('my-id').value = this.peer.id;
            }

            showJoin() {
                document.getElementById('intro').classList.add('hidden');
                document.getElementById('join-panel').classList.remove('hidden');
            }

            connectToHost() {
                const hostId = document.getElementById('host-id').value.trim();
                if(!hostId) {
                    alert("Please enter a Host ID");
                    return;
                }
                
                const conn = this.peer.connect(hostId);
                this.setupConnection(conn);
            }

            setupConnection(conn) {
                this.conn = conn;
                
                this.conn.on('open', () => {
                    console.log("Data Connection Open");
                    if(this.isHost) {
                        document.getElementById('conn-status').innerText = "PLAYER 2 CONNECTED!";
                        document.getElementById('conn-status').style.color = "#0f0";
                        document.getElementById('host-controls').classList.remove('hidden');
                        document.getElementById('p2-stat').style.color = "#0f0";
                    } else {
                        document.getElementById('join-panel').classList.add('hidden');
                        document.getElementById('game-ui').style.display = 'block';
                        document.getElementById('p1-stat').innerText = "P1 (HOST)";
                        document.getElementById('rom-status').innerText = "Waiting for host to upload ROM...";
                    }
                });

                this.conn.on('data', (data) => {
                    this.handleData(data);
                });

                this.conn.on('close', () => {
                    if(this.isRunning) {
                        alert("Opponent Disconnected");
                        location.reload();
                    }
                });
            }

            send(data) {
                if(this.conn && this.conn.open) {
                    this.conn.send(data);
                }
            }

            handleData(data) {
                // Host Receives Input
                if(this.isHost) {
                    if(data.t === 'I') { // Input
                        if(this.nes) {
                            if(data.d) this.nes.buttonDown(2, data.b);
                            else this.nes.buttonUp(2, data.b);
                        }
                    }
                } 
                // Client Receives Data
                else {
                    if(data.t === 'R') { // ROM
                        document.getElementById('rom-status').innerText = "ROM Received. Starting...";
                        this.startGame(data.d);
                    }
                    if(data.t === 'V') { // Video Frame
                        if(this.screenBuffer) {
                            // data.b is an ImageBitmap
                            const ctx = document.getElementById('nes-canvas').getContext('2d');
                            ctx.drawImage(data.b, 0, 0);
                            if(this.is3D && this.tex) this.tex.needsUpdate = true;
                        }
                    }
                }
            }

            fileSelected(inp) {
                const f = inp.files[0];
                if(!f) return;
                
                document.getElementById('rom-status').innerText = "Reading file...";
                
                const r = new FileReader();
                r.onload = e => {
                    this.romData = e.target.result;
                    document.getElementById('rom-status').innerText = "File read. Starting engine...";
                    this.startGame(this.romData);
                    this.send({ t: 'R', d: this.romData });
                };
                r.onerror = () => {
                    alert("Error reading file.");
                    document.getElementById('rom-status').innerText = "Error reading file.";
                };
                r.readAsArrayBuffer(f);
            }

            startGame(romData) {
                try {
                    if(this.isRunning) return; // Prevent double start

                    // --- CRITICAL FIX ---
                    // jsNES requires a Uint8Array. FileReader and PeerJS provide ArrayBuffer.
                    // We must convert it here.
                    let romArray = romData;
                    if (romData instanceof ArrayBuffer) {
                        romArray = new Uint8Array(romData);
                    } else if (romData instanceof Uint8Array) {
                        // pass through
                    } else {
                        throw new Error("Invalid ROM data format received.");
                    }
                    // ---------------------

                    // Hide panels, show game
                    if(this.isHost) document.getElementById('create-panel').classList.add('hidden');
                    document.getElementById('game-ui').style.display = 'block';

                    const cvs = document.getElementById('nes-canvas');
                    const ctx = cvs.getContext('2d');
                    this.screenBuffer = ctx.createImageData(256,240);

                    // Initialize jsNES
                    if(typeof jsnes === 'undefined') {
                        throw new Error("jsNES library not loaded.");
                    }

                    this.nes = new jsnes.NES({
                        onFrame: buf => {
                            // buf is a 32-bit integer array (RGBA)
                            const d = this.screenBuffer.data;
                            // Fast copy
                            // jsNES provides a standard 32bit buffer usually, but we need 8bit for putImageData
                            // The default jsNES onFrame usually gives a 256*240 array of 32bit colors
                            for(let i=0; i<buf.length; i++) {
                                const val = buf[i];
                                d[i*4] = val & 0xFF;         // R
                                d[i*4+1] = (val>>8) & 0xFF;  // G
                                d[i*4+2] = (val>>16) & 0xFF; // B
                                d[i*4+3] = 0xFF;             // A
                            }
                            
                            ctx.putImageData(this.screenBuffer, 0, 0);
                            
                            if(this.is3D && this.tex) {
                                this.tex.needsUpdate = true;
                            }

                            // Stream to P2 if Host
                            if(this.isHost && this.conn && this.conn.open) {
                                // Using createImageBitmap is efficient for transfer
                                createImageBitmap(cvs).then(bmp => {
                                    this.send({ t: 'V', b: bmp });
                                }).catch(e => console.error("Bitmap error", e));
                            }
                        },
                        onAudioSample: ()=>{ /* Muted to prevent browser auto-play issues */ }
                    });

                    this.nes.loadROM(romArray);
                    this.isRunning = true;
                    this.loop();

                } catch (e) {
                    console.error(e);
                    alert("Failed to start ROM: " + e.message + "\n\nEnsure you selected a valid .nes file.");
                    document.getElementById('rom-status').innerText = "Error: " + e.message;
                    // Reset UI slightly if needed
                    if(this.isHost) document.getElementById('host-controls').classList.remove('hidden');
                }
            }

            loop() {
                if(this.nes && this.isRunning) {
                    this.nes.frame();
                    requestAnimationFrame(()=>this.loop());
                }
            }

            // --- INPUTS ---
            btn(pl, b, d) {
                // Local Injection
                if(this.nes) {
                    if(d) this.nes.buttonDown(pl, b);
                    else this.nes.buttonUp(pl, b);
                }
                
                // Network Send (Only if P2 or if Host sending P2 input - wait, no)
                // Logic: P2 (Client) sends their inputs to Host
                // Host (P1) runs emulation and sends video back.
                
                if(!this.isHost && pl === 2) {
                    this.send({ t: 'I', b: b, d: d });
                }
            }

            key(k, d) {
                let b=null, pl=1;
                k=k.toLowerCase();
                
                // P1 (Host)
                if(k==='arrowleft') b=C.L; if(k==='arrowright') b=C.R;
                if(k==='arrowup') b=C.U; if(k==='arrowdown') b=C.D;
                if(k==='z') b=C.A; if(k==='x') b=C.B;
                if(k==='enter') b=C.ST; if(k==='shift') b=C.SEL;
                
                // P2 (Client)
                // Note: If I am Host, I control P1.
                // If I am Client, I control P2.
                if(!b) {
                    // Check if these keys map to P2
                    if(k==='a') b=C.L; if(k==='d') b=C.R;
                    if(k==='w') b=C.U; if(k==='s') b=C.D;
                    if(k==='f') b=C.A; if(k==='g') b=C.B;
                    if(k==='h') b=C.ST; if(k==='j') b=C.SEL;
                    
                    if(b) pl = 2;
                }
                
                if(b) this.btn(pl, b, d);
            }
