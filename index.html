<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOLI 3D - FIXED MULTIPLAYER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(10, 10, 20, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Rajdhani', sans-serif;
            color: white;
        }

        /* --- 3D BACKGROUND --- */
        #world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .interactive { pointer-events: auto; }

        /* --- MENUS --- */
        .hud-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .hidden { display: none !important; }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-purple);
            margin: 0 0 20px 0;
        }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-purple);
            color: white;
            padding: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            width: 150px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            background: linear-gradient(45deg, #000, #222);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
        }
        .btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- GAME HUD --- */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px black;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        .status-item.connected { border-color: #0f0; color: #0f0; }
        .status-item.waiting { border-color: #f00; color: #f00; }

        /* --- VIRTUAL CONTROLLERS (VISUAL FEEDBACK) --- */
        .controllers-wrapper {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .controller {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .c-row { display: flex; gap: 5px; }
        
        .c-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
            transition: 0.1s;
        }
        
        .c-btn.active {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 35px);
            grid-template-rows: repeat(3, 35px);
            gap: 2px;
        }
        .d-btn {
            background: #222;
            border: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .d-btn.active { background: var(--neon-blue); border-color: white; }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }

        /* Hidden canvas */
        #nes-canvas { display: none; }

    </style>
</head>
<body>

    <div id="world"></div>
    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <div id="ui-layer">
        
        <!-- Intro -->
        <div id="intro" class="hud-panel interactive">
            <div class="title">JOJOLI 3D</div>
            <button class="btn" onclick="app.startSystem()">ENTER SYSTEM</button>
        </div>

        <!-- Menu -->
        <div id="menu" class="hud-panel interactive hidden">
            <div class="title">LOBBY</div>
            <button class="btn" onclick="app.createRoom()">CREATE ROOM</button>
            <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <input type="text" id="join-code" placeholder="CODE">
                <button class="btn" onclick="app.joinRoom()">JOIN</button>
            </div>
            <p style="font-size:0.8rem; color:#888; margin-top:20px;">
                * Open this file in a second tab to play multiplayer.
            </p>
        </div>

        <!-- Room Panel -->
        <div id="room-panel" class="hud-panel interactive hidden">
            <div class="title" id="room-status-text">WAITING...</div>
            <h1 id="room-code-display" style="font-family:'Orbitron'; font-size:3rem; margin:10px 0; color:var(--neon-purple);">------</h1>
            
            <div id="host-upload" class="hidden">
                <p>Select ROM to Start</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.handleRom(this)">
                <button class="btn" onclick="document.getElementById('rom-file').click()">UPLOAD .NES</button>
            </div>
        </div>

        <!-- Game UI (Hidden until game starts) -->
        <div id="game-ui">
            <div class="top-bar">
                <div id="p1-status" class="status-item connected">P1 (HOST)</div>
                <div id="room-code-mini" style="color:#aaa;"></div>
                <div id="p2-status" class="status-item waiting">P2 (FRIEND)</div>
            </div>

            <div class="controllers-wrapper">
                <!-- P1 Visuals -->
                <div class="controller">
                    <div style="color:#aaa; font-size:0.8rem;">PLAYER 1</div>
                    <div class="c-row">
                        <div id="p1-select" class="c-btn">SEL</div>
                        <div id="p1-start" class="c-btn">STA</div>
                    </div>
                    <div class="c-row" style="margin-left: 20px;">
                        <div id="p1-b" class="c-btn">B</div>
                        <div id="p1-a" class="c-btn">A</div>
                    </div>
                    <div class="d-pad" style="margin-top:10px;">
                        <div id="p1-up" class="d-btn d-up">▲</div>
                        <div id="p1-left" class="d-btn d-left">◀</div>
                        <div id="p1-right" class="d-btn d-right">▶</div>
                        <div id="p1-down" class="d-btn d-down">▼</div>
                    </div>
                </div>

                <!-- P2 Visuals -->
                <div class="controller">
                    <div style="color:#aaa; font-size:0.8rem;">PLAYER 2</div>
                    <div class="c-row">
                        <div id="p2-select" class="c-btn">J</div>
                        <div id="p2-start" class="c-btn">H</div>
                    </div>
                    <div class="c-row" style="margin-left: 20px;">
                        <div id="p2-b" class="c-btn">G</div>
                        <div id="p2-a" class="c-btn">F</div>
                    </div>
                    <div class="d-pad" style="margin-top:10px;">
                        <div id="p2-up" class="d-btn d-up">▲</div>
                        <div id="p2-left" class="d-btn d-left">◀</div>
                        <div id="p2-right" class="d-btn d-right">▶</div>
                        <div id="p2-down" class="d-btn d-down">▼</div>
                    </div>
                </div>
            </div>
            
            <div style="position:absolute; bottom: 250px; width:100%; text-align:center; color:yellow; background:rgba(0,0,0,0.5); padding:5px;">
                P2 MUST PRESS "START" (H) TO JOIN GAME
            </div>
        </div>
    </div>

    <script>
        const CHANNEL = 'jojoli_fixed_v1';

        class App {
            constructor() {
                this.scene = null; this.camera = null; this.renderer = null;
                this.screenMesh = null; this.screenTexture = null;
                this.nes = null;
                
                this.network = new BroadcastChannel(CHANNEL);
                this.isHost = false;
                this.roomCode = null;
                this.romData = null;
                this.p2Connected = false;
                
                this.initThree();
                this.animate();

                // Unified Network Listener
                this.network.onmessage = (e) => this.handleNetwork(e.data);

                // Local Input Listeners
                window.addEventListener('keydown', e => this.handleKey(e, true));
                window.addEventListener('keyup', e => this.handleKey(e, false));
            }

            initThree() {
                const container = document.getElementById('world');
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000000, 0.03);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                this.camera.position.z = 4;
                this.camera.position.y = 0.5;

                this.renderer = new THREE.WebGLRenderer({ alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(this.renderer.domElement);

                // TV Frame
                const frameGeo = new THREE.BoxGeometry(4.5, 3.5, 0.5);
                const frameMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                this.scene.add(frame);

                // Screen
                const canvas = document.getElementById('nes-canvas');
                this.screenTexture = new THREE.CanvasTexture(canvas);
                this.screenTexture.minFilter = THREE.NearestFilter;
                this.screenTexture.magFilter = THREE.NearestFilter;

                const screenGeo = new THREE.PlaneGeometry(4, 3);
                const screenMat = new THREE.MeshBasicMaterial({ map: this.screenTexture });
                this.screenMesh = new THREE.Mesh(screenGeo, screenMat);
                this.screenMesh.position.z = 0.26;
                frame.add(this.screenMesh);

                // Lights
                const l1 = new THREE.PointLight(0x00f3ff, 1, 20);
                l1.position.set(5,5,5);
                this.scene.add(l1);
                const l2 = new THREE.PointLight(0xbc13fe, 1, 20);
                l2.position.set(-5,5,5);
                this.scene.add(l2);

                // Grid
                const grid = new THREE.GridHelper(30, 30, 0x333333, 0x111111);
                grid.position.y = -2.5;
                this.scene.add(grid);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth/window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.camera.position.x = Math.sin(Date.now()*0.0005)*0.3;
                this.camera.lookAt(0,0,0);
                this.renderer.render(this.scene, this.camera);
            }

            // --- APP FLOW ---

            startSystem() {
                document.getElementById('intro').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
                this.speak("System Online");
            }

            createRoom() {
                this.isHost = true;
                this.roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('room-panel').classList.remove('hidden');
                document.getElementById('room-code-display').innerText = this.roomCode;
                document.getElementById('host-upload').classList.remove('hidden');
                document.getElementById('p1-status').classList.add('connected');
                document.getElementById('room-code-mini').innerText = "CODE: " + this.roomCode;
            }

            joinRoom() {
                const code = document.getElementById('join-code').value.toUpperCase();
                if(!code) return;
                
                this.isHost = false;
                this.roomCode = code;
                
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('room-panel').classList.remove('hidden');
                document.getElementById('room-status-text').innerText = "CONNECTING...";
                document.getElementById('room-code-display').innerText = code;
                document.getElementById('p2-status').classList.add('connected');
                document.getElementById('p2-status').innerText = "P2 (YOU)";

                this.network.postMessage({ type: 'JOIN', code: code });
            }

            // --- NES LOGIC ---

            handleRom(input) {
                const file = input.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.romData = e.target.result;
                    this.startGame(this.romData);
                    if(this.p2Connected) {
                        this.network.postMessage({ type: 'ROM', data: this.romData });
                    }
                };
                reader.readAsArrayBuffer(file);
            }

            startGame(romData) {
                document.getElementById('room-panel').classList.add('hidden');
                document.getElementById('game-ui').style.display = 'block';

                const canvas = document.getElementById('nes-canvas');
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(256, 240);

                this.nes = new jsnes.NES({
                    onFrame: (buffer) => {
                        // Render to canvas
                        const data = imgData.data;
                        for(let i=0; i<buffer.length; i++) {
                            const col = buffer[i];
                            data[i*4] = col & 0xFF;
                            data[i*4+1] = (col>>8) & 0xFF;
                            data[i*4+2] = (col>>16) & 0xFF;
                            data[i*4+3] = 0xFF;
                        }
                        ctx.putImageData(imgData, 0, 0);
                        
                        // Update 3D Texture
                        if(this.screenTexture) this.screenTexture.needsUpdate = true;

                        // Stream to P2 if Host
                        if(this.isHost && this.p2Connected) {
                            createImageBitmap(canvas).then(bmp => {
                                this.network.postMessage({ type: 'FRAME', bmp: bmp }, [bmp]);
                            }).catch(e => console.log("Stream error", e));
                        }
                    },
                    onAudioSample: () => {}
                });

                this.nes.loadROM(romData);
                this.loop();
            }

            loop() {
                if(!this.nes) return;
                this.nes.frame();
                requestAnimationFrame(() => this.loop());
            }

            // --- NETWORK ---

            handleNetwork(data) {
                if(this.isHost) {
                    // Host receives Join Request
                    if(data.type === 'JOIN' && data.code === this.roomCode) {
                        this.p2Connected = true;
                        document.getElementById('p2-status').classList.remove('waiting');
                        document.getElementById('p2-status').classList.add('connected');
                        this.speak("Player 2 Connected");
                        this.network.postMessage({ type: 'ACCEPT' });
                        if(this.romData) {
                            this.network.postMessage({ type: 'ROM', data: this.romData });
                        }
                    }
                    // Host receives P2 Input
                    else if(data.type === 'INPUT') {
                        this.updateControllerState(data.player, data.btn, data.pressed);
                        // Directly inject into NES
                        if(data.pressed) this.nes.buttonDown(2, data.btn);
                        else this.nes.buttonUp(2, data.btn);
                    }
                } 
                else {
                    // Client receives Accept
                    if(data.type === 'ACCEPT') {
                        document.getElementById('room-status-text').innerText = "CONNECTED. WAITING FOR ROM...";
                    }
                    // Client receives ROM
                    else if(data.type === 'ROM') {
                        this.startGame(data.data);
                    }
                    // Client receives Video Frame
                    else if(data.type === 'FRAME') {
                        const ctx = document.getElementById('nes-canvas').getContext('2d');
                        ctx.drawImage(data.bmp, 0, 0);
                        if(this.screenTexture) this.screenTexture.needsUpdate = true;
                    }
                }
            }

            // --- INPUTS ---

            handleKey(e, isDown) {
                // Check if this key belongs to P2 logic if we are client
                const isP2Key = this.checkP2(e.key);
                
                if(!this.isHost && isP2Key) {
                    // Send to host
                    const btn = this.mapKey(e.key, 2);
                    if(btn) {
                        this.network.postMessage({
                            type: 'INPUT',
                            player: 2,
                            btn: btn,
                            pressed: isDown
                        });
                        // Update local visual UI
                        this.updateControllerState(2, btn, isDown);
                    }
                    return;
                }

                // Local Handling (P1 always, and P2 if Host testing)
                this.processLocalInput(e.key, isDown, 1);
                if(this.isHost) this.processLocalInput(e.key, isDown, 2);
            }

            processLocalInput(key, isDown, player) {
                const btn = this.mapKey(key, player);
                if(btn) {
                    this.updateControllerState(player, btn, isDown);
                    if(this.nes) {
                        if(isDown) this.nes.buttonDown(player, btn);
                        else this.nes.buttonUp(player, btn);
                    }
                }
            }

            mapKey(key, player) {
                const k = key.toLowerCase();
                if(player === 1) {
                    if(k === 'arrowleft') return jsnes.Controller.BUTTON_LEFT;
                    if(k === 'arrowright') return jsnes.Controller.BUTTON_RIGHT;
                    if(k === 'arrowup') return jsnes.Controller.BUTTON_UP;
                    if(k === 'arrowdown') return jsnes.Controller.BUTTON_DOWN;
                    if(k === 'z') return jsnes.Controller.BUTTON_A;
                    if(k === 'x') return jsnes.Controller.BUTTON_B;
                    if(k === 'enter') return jsnes.Controller.BUTTON_START;
                    if(k === 'shift') return jsnes.Controller.BUTTON_SELECT;
                } else {
                    if(k === 'a') return jsnes.Controller.BUTTON_LEFT;
                    if(k === 'd') return jsnes.Controller.BUTTON_RIGHT;
                    if(k === 'w') return jsnes.Controller.BUTTON_UP;
                    if(k === 's') return jsnes.Controller.BUTTON_DOWN;
                    if(k === 'f') return jsnes.Controller.BUTTON_A;
                    if(k === 'g') return jsnes.Controller.BUTTON_B;
                    if(k === 'h') return jsnes.Controller.BUTTON_START;
                    if(k === 'j') return jsnes.Controller.BUTTON_SELECT;
                }
                return null;
            }

            checkP2(key) {
                const k = key.toLowerCase();
                return ['w','a','s','d','f','g','h','j'].includes(k);
            }

            updateControllerState(player, btn, pressed) {
                const map = {
                    [jsnes.Controller.BUTTON_LEFT]: 'left',
                    [jsnes.Controller.BUTTON_RIGHT]: 'right',
                    [jsnes.Controller.BUTTON_UP]: 'up',
                    [jsnes.Controller.BUTTON_DOWN]: 'down',
                    [jsnes.Controller.BUTTON_A]: 'a',
                    [jsnes.Controller.BUTTON_B]: 'b',
                    [jsnes.Controller.BUTTON_START]: 'start',
                    [jsnes.Controller.BUTTON_SELECT]: 'select',
                };
                const id = `p${player}-${map[btn]}`;
                const el = document.getElementById(id);
                if(el) {
                    if(pressed) el.classList.add('active');
                    else el.classList.remove('active');
                }
            }

            speak(text) {
                if('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    window.speechSynthesis.speak(u);
                }
            }
        }

        const app = new App();

    </script>
</body>
</html>
