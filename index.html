<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jojoli Online - Universal Connect</title>
    
    <!-- Use specific versions with cache buster to ensure fresh load -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js?v=2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js?v=2"></script>
    <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js?v=2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg: #050505;
            --glass: rgba(0, 0, 0, 0.95);
            --error: #ff3333;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body {
            margin: 0; overflow: hidden; background: var(--bg);
            font-family: 'Share Tech Mono', monospace; color: white;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        #world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #screen-container { display: none; }
        canvas#nes-canvas { display: block; width: 256px; height: 240px; }
        video#remote-video { display: none; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        .panel {
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 20px; text-align: center;
            max-width: 95%; width: 500px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0; text-transform: uppercase; }
        
        .mode-btn {
            background: var(--neon-blue); color: black; border: none;
            padding: 15px; font-family: 'Orbitron'; font-size: 1.1rem; cursor: pointer;
            font-weight: bold; transition: 0.2s; text-transform: uppercase;
        }
        .mode-btn:hover { transform: scale(1.05); }
        .mode-btn:disabled { background: #333; color: #666; cursor: wait; }
        
        input {
            width: 100%; padding: 10px; background: #000; border: 1px solid #555;
            color: white; font-family: monospace; text-align: center; font-size: 1.2rem;
        }
        input:focus { outline: 1px solid var(--neon-blue); }

        .log-text { font-size: 0.8rem; min-height: 1.2em; margin-top: 5px; }
        .error-text { color: var(--error); }
        .success-text { color: #0f0; }

        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon-blue);
            display: flex; justify-content: space-between; padding: 10px 20px;
            font-family: 'Orbitron'; font-size: 0.9rem; z-index: 20; pointer-events: auto;
        }

        #controls-layer {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 20;
        }
        @media (min-width: 1024px) { #controls-layer { opacity: 0.3; } }

        .c-zone { pointer-events: auto; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .d-pad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .d-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #555; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border-radius: 4px;
        }
        .d-btn:active, .d-btn.pressed { background: var(--neon-blue); color: black; }
        
        .ab-btns { display: flex; gap: 20px; }
        .ab-btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--neon-pink); border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 10px var(--neon-pink);
        }
        .ab-btn:active, .ab-btn.pressed { transform: scale(0.9); background: white; }
    </style>
</head>
<body>

    <div id="world"></div>
    <div id="screen-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>
    <video id="remote-video" autoplay playsinline muted></video>

    <div id="ui-layer">
        <!-- Intro Panel -->
        <div id="intro" class="panel interactive">
            <h1>Jojoli Online</h1>
            <div id="sys-status" class="log-text" style="color:#aaa">Initializing Network Relay...</div>
            <hr style="border-color:#333; width:100%">
            <button class="mode-btn" id="btn-create" onclick="app.createRoom()" disabled>HOST GAME</button>
            <button class="mode-btn" id="btn-join" onclick="app.showJoin()" disabled>JOIN GAME</button>
            <div id="intro-error" class="log-text error-text"></div>
        </div>

        <!-- Host Panel -->
        <div id="create-panel" class="panel interactive hidden">
            <h1>HOSTING</h1>
            <p style="font-size:0.8rem; color:#ccc">Copy this code:</p>
            <input type="text" id="my-id" readonly onclick="this.select()" style="color:var(--neon-blue)">
            <div id="host-status" class="log-text" style="color:#aaa">Waiting for player...</div>
            
            <div id="host-controls" class="hidden">
                <hr style="border-color:#333">
                <div class="success-text">PLAYER CONNECTED!</div>
                <p>Select .NES ROM:</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.fileSelected(this)">
                <button class="mode-btn" onclick="document.getElementById('rom-file').click()">UPLOAD & PLAY</button>
            </div>
        </div>

        <!-- Join Panel -->
        <div id="join-panel" class="panel interactive hidden">
            <h1>JOIN GAME</h1>
            <p>Paste Host Code:</p>
            <input type="text" id="host-id" placeholder="PASTE CODE HERE">
            <button class="mode-btn" onclick="app.connectToHost()" id="btn-connect-action">CONNECT</button>
            <div id="join-status" class="log-text"></div>
        </div>

        <!-- Gameplay UI -->
        <div id="game-ui">
            <div class="status-bar">
                <span id="p1-stat">P1 (HOST)</span>
                <span style="color:#00f3ff">LIVE</span>
                <span id="p2-stat">P2 (CLIENT)</span>
            </div>

            <div id="controls-layer">
                <div class="c-zone">
                    <div class="d-pad">
                        <div class="d-btn d-up" data-key="ArrowUp">▲</div>
                        <div class="d-btn d-left" data-key="ArrowLeft">◀</div>
                        <div class="d-btn d-right" data-key="ArrowRight">▶</div>
                        <div class="d-btn d-down" data-key="ArrowDown">▼</div>
                    </div>
                </div>
                <div class="c-zone">
                    <div class="ab-btns">
                        <div class="ab-btn" style="background:#d32f2f; box-shadow:0 0 10px #d32f2f" data-key="x">B</div>
                        <div class="ab-btn" data-key="z">A</div>
                    </div>
                </div>
            </div>
            <div style="position:absolute; bottom:10px; width:100%; text-align:center; color:#444; font-size:0.7rem;">
                P1: Arrows + Z/X | P2: WASD + F/G
            </div>
        </div>
    </div>

    <script>
        const C = { A:1, B:2, SEL:3, ST:4, U:5, D:6, L:7, R:8 };

        class JojoliApp {
            constructor() {
                this.isHost = false;
                this.nes = null;
                this.conn = null; // Data
                this.call = null; // Video
                this.romData = null;
                this.is3D = false;

                if(typeof Peer === 'undefined' || typeof THREE === 'undefined' || typeof jsnes === 'undefined') {
                    this.logError("Critical Error: Libraries failed to load. Check internet/adblocker.");
                    return;
                }

                this.initGraphics();
                this.initPeerJS(); // This now includes TURN servers
                this.bindInputs();
            }

            logError(msg) {
                console.error(msg);
                const el = document.getElementById('intro-error');
                if(el) el.innerText = msg;
                const status = document.getElementById('sys-status');
                if(status) status.innerText = "ERROR";
            }

            initGraphics() {
                const cvs = document.getElementById('nes-canvas');
                try {
                    this.sc = new THREE.Scene();
                    this.cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                    this.cam.position.z = 3.5;
                    this.ren = new THREE.WebGLRenderer({ alpha: true });
                    this.ren.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('world').appendChild(this.ren.domElement);
                    
                    this.tex = new THREE.CanvasTexture(cvs);
                    this.tex.minFilter = THREE.NearestFilter;
                    
                    this.sc.add(new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.6), new THREE.MeshBasicMaterial({ map: this.tex })));
                    this.sc.add(new THREE.AmbientLight(1));
                    
                    this.is3D = true;
                    this.loop3D();
                } catch(e) { console.warn("3D fail", e); }
            }

            loop3D() {
                requestAnimationFrame(() => this.loop3D());
                // Client: Draw Video -> Canvas -> Texture
                if(!this.isHost) {
                    const vid = document.getElementById('remote-video');
                    if(vid.readyState === 4) {
                        const cvs = document.getElementById('nes-canvas');
                        const ctx = cvs.getContext('2d');
                        ctx.drawImage(vid, 0, 0, 256, 240);
                        if(this.tex) this.tex.needsUpdate = true;
                    }
                } else {
                    if(this.tex) this.tex.needsUpdate = true;
                }
                this.ren.render(this.sc, this.cam);
            }

            initPeerJS() {
                document.getElementById('sys-status').innerText = "Connecting to Relay Server...";

                // CONFIGURATION: Using OpenRelay as a free TURN server to bypass Firewalls
                const peerConfig = {
                    debug: 2,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:global.stun.twilio.com:3478' },
                            // Free TURN credentials from openrelay project
                            { 
                                urls: 'turn:openrelay.metered.ca:443', 
                                username: 'openrelayproject', 
                                credential: 'openrelayproject' 
                            },
                            { 
                                urls: 'turn:openrelay.metered.ca:80', 
                                username: 'openrelayproject', 
                                credential: 'openrelayproject' 
                            }
                        ]
                    }
                };

                this.peer = new Peer(null, peerConfig);

                this.peer.on('open', (id) => {
                    console.log('My ID:', id);
                    document.getElementById('sys-status').innerText = "System Ready";
                    document.getElementById('sys-status').className = "log-text success-text";
                    document.getElementById('btn-create').disabled = false;
                    document.getElementById('btn-join').disabled = false;
                });

                this.peer.on('connection', (conn) => {
                    this.setupConnection(conn);
                });

                this.peer.on('call', (call) => {
                    // Client answers video call
                    call.answer();
                    call.on('stream', (remoteStream) => {
                        console.log("Video received");
                        const vid = document.getElementById('remote-video');
                        vid.srcObject = remoteStream;
                        vid.play();
                    });
                    this.call = call;
                });

                this.peer.on('error', (err) => {
                    console.error(err);
                    let msg = "Connection Error";
                    if(err.type === 'peer-unavailable') msg = "Host ID not found.\nCheck the code or ensure Host is online.";
                    if(err.type === 'network') msg = "Network blocked.\nDisable VPN or try different Wi-Fi.";
                    if(err.type === 'disconnected') msg = "Lost connection to server.";
                    
                    alert(msg);
                    
                    // Update UI if in join panel
                    const status = document.getElementById('join-status');
                    if(status) {
                        status.innerText = msg;
                        status.className = "log-text error-text";
                        document.getElementById('btn-connect-action').disabled = false;
                        document.getElementById('btn-connect-action').innerText = "RETRY";
                    } else {
                        this.logError(msg);
                    }
                });
            }

            createRoom() {
                this.isHost = true;
                this.switchPanel('create-panel');
                document.getElementById('my-id').value = this.peer.id;
            }

            showJoin() {
                this.switchPanel('join-panel');
            }

            connectToHost() {
                const hostId = document.getElementById('host-id').value.trim();
                if(!hostId) {
                    alert("Please enter a code");
                    return;
                }
                
                const status = document.getElementById('join-status');
                const btn = document.getElementById('btn-connect-action');
                
                status.innerText = "Connecting (This may take 10s)...";
                status.className = "log-text";
                btn.disabled = true;
                btn.innerText = "CONNECTING...";

                // Connect Data Channel
                const conn = this.peer.connect(hostId, { reliable: true });
                this.setupConnection(conn);
            }

            setupConnection(conn) {
                this.conn = conn;
                
                // Timeout handling
                const timeout = setTimeout(() => {
                    if(!this.conn.open) {
                        alert("Connection Timeout. \n\nIf this fails, you might be behind a strict firewall.");
                        document.getElementById('btn-connect-action').disabled = false;
                        document.getElementById('btn-connect-action').innerText = "RETRY";
                    }
                }, 15000);

                conn.on('open', () => {
                    clearTimeout(timeout);
                    console.log("Data Connection Open");
                    if(this.isHost) {
                        document.getElementById('host-status').innerText = "Connected!";
                        document.getElementById('host-status').className = "log-text success-text";
                        document.getElementById('host-controls').classList.remove('hidden');
                    } else {
                        this.switchPanel('game-ui');
                        document.getElementById('p1-stat').innerText = "P1 (HOST)";
                        document.getElementById('p2-stat').innerText = "P2 (YOU)";
                    }
                });

                conn.on('data', (data) => this.handleData(data));

                conn.on('close', () => {
                    alert("Disconnected");
                    location.reload();
                });
            }

            handleData(data) {
                if(this.isHost) {
                    if(data.t === 'I') { // Input
                        if(this.nes) {
                            if(data.d) this.nes.buttonDown(2, data.b);
                            else this.nes.buttonUp(2, data.b);
                        }
                    }
                } 
                else {
                    if(data.t === 'R') { // ROM
                        this.loadRomFromBase64(data.d);
                    }
                }
            }

            // --- ROM & EMULATION ---

            fileSelected(inp) {
                const f = inp.files[0];
                if(!f) return;
                const r = new FileReader();
                r.onload = e => {
                    const buffer = e.target.result;
                    const bytes = new Uint8Array(buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                    const base64 = window.btoa(binary);
                    
                    this.romData = base64;
                    this.loadRomFromBase64(base64);
                    this.send({ t: 'R', d: base64 });
                };
                r.readAsArrayBuffer(f);
            }

            loadRomFromBase64(b64) {
                try {
                    const binStr = window.atob(b64);
                    const bytes = new Uint8Array(binStr.length);
                    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                    this.startGame(bytes);
                } catch(e) {
                    alert("Error loading ROM.");
                }
            }

            startGame(romUint8Array) {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById('game-ui').style.display = 'block';

                const cvs = document.getElementById('nes-canvas');
                const ctx = cvs.getContext('2d');
                const img = ctx.createImageData(256,240);

                this.nes = new jsnes.NES({
                    onFrame: (buffer) => {
                        const data = img.data;
                        for(let i=0; i<buffer.length; i++) {
                            const c = buffer[i];
                            data[i*4]=c&0xFF; data[i*4+1]=(c>>8)&0xFF; data[i*4+2]=(c>>16)&0xFF; data[i*4+3]=255;
                        }
                        ctx.putImageData(img, 0, 0);
                    },
                    onAudioSample: ()=>{}
                });

                try {
                    this.nes.loadROM(romUint8Array);
                    
                    if(this.isHost) {
                        const stream = cvs.captureStream(30);
                        if(this.conn && this.conn.open) {
                            this.call = this.peer.call(this.conn.peer, stream);
                        }
                    }
                    
                    this.loop();
                } catch(e) {
                    alert("ROM invalid");
                    console.error(e);
                }
            }

            loop() {
                if(this.nes) {
                    this.nes.frame();
                    requestAnimationFrame(()=>this.loop());
                }
            }

            send(data) {
                if(this.conn && this.conn.open) this.conn.send(data);
            }

            bindInputs() {
                const buttons = document.querySelectorAll('.d-btn, .ab-btn');
                buttons.forEach(btn => {
                    const k = btn.dataset.key;
                    if(!k) return;
                    const down = (e) => { e.preventDefault(); this.simKey(k, true); btn.classList.add('pressed'); };
                    const up = (e) => { e.preventDefault(); this.simKey(k, false); btn.classList.remove('pressed'); };
                    btn.addEventListener('mousedown', down);
                    btn.addEventListener('mouseup', up);
                    btn.addEventListener('mouseleave', up);
                    btn.addEventListener('touchstart', down, {passive: false});
                    btn.addEventListener('touchend', up, {passive: false});
                });

                window.addEventListener('keydown', e => this.simKey(e.key, true));
                window.addEventListener('keyup', e => this.simKey(e.key, false));
            }

            simKey(key, isDown) {
                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(key) && this.nes) event.preventDefault();

                let btn = null, pl = 1;
                let k = key.toLowerCase();
                
                // P1
                if(k==='arrowup') btn=C.U; if(k==='arrowdown') btn=C.D;
                if(k==='arrowleft') btn=C.L; if(k==='arrowright') btn=C.R;
                if(k==='z') btn=C.A; if(k==='x') btn=C.B;
                
                // P2
                if(!btn) {
                    pl=2;
                    if(k==='w') btn=C.U; if(k==='s') btn=C.D;
                    if(k==='a') btn=C.L; if(k==='d') btn=C.R;
                    if(k==='f') btn=C.A; if(k==='g') btn=C.B;
                }
                
                if(btn) {
                    if(this.nes) {
                        if(isDown) this.nes.buttonDown(pl, btn);
                        else this.nes.buttonUp(pl, btn);
                    }
                    if(!this.isHost && pl === 2) {
                        this.send({ t: 'I', b: btn, d: isDown });
                    }
                }
            }
            
            switchPanel(id) {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.app = new JojoliApp();
        });
    </script>
</body>
</html>
