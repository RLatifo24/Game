<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOJOLI 3D - MOBILE READY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(10, 10, 20, 0.9);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
        }

        /* --- 3D BACKGROUND --- */
        #world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .interactive { pointer-events: auto; }

        /* --- MENUS --- */
        .hud-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        .hidden { display: none !important; }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-purple);
            margin: 0 0 15px 0;
        }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-purple);
            color: white;
            padding: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn {
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
            width: 100%;
        }
        .btn:active { background: var(--neon-blue); color: black; }

        /* --- GAME HUD --- */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
        }

        /* --- MOBILE / TOUCH CONTROLS --- */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            /* Hide on large screens by default, show on touch or small width */
        }

        @media (min-width: 1025px) {
            #mobile-controls { display: none; }
            #pc-hint { display: block; }
        }
        @media (max-width: 1024px) {
            #pc-hint { display: none; }
            #mobile-controls { display: flex; }
        }

        .control-zone {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
            width: 140px;
        }

        .d-pad-container {
            display: grid;
            grid-template-columns: repeat(3, 45px);
            grid-template-rows: repeat(3, 45px);
            gap: 5px;
            margin-bottom: 20px;
        }

        .ab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .touch-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
            transition: background 0.1s;
        }
        .touch-btn:active, .touch-btn.active {
            background: rgba(0, 243, 255, 0.4);
            border-color: var(--neon-blue);
            color: white;
            transform: scale(0.95);
        }

        /* D-Pad positioning */
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }
        .d-center { grid-column: 2; grid-row: 2; background: transparent; border: none; }

        /* Action Buttons */
        .btn-b { width: 60px; height: 60px; border-radius: 50%; }
        .btn-a { width: 60px; height: 60px; border-radius: 50%; background: rgba(188, 19, 254, 0.2); border-color: var(--neon-purple); }

        .meta-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        .btn-sel, .btn-st { width: 40px; height: 20px; font-size: 0.6rem; border-radius: 10px; }

        /* Hidden Canvas */
        #nes-canvas { display: none; }

        /* Exit Fullscreen Button */
        #exit-fs {
            position: absolute;
            top: 50px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: auto;
            z-index: 100;
            display: none;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="world"></div>
    <canvas id="nes-canvas" width="256" height="240"></canvas>
    <button id="exit-fs" onclick="app.exitFullScreen()">EXIT FULLSCREEN</button>

    <div id="ui-layer">
        
        <!-- Intro -->
        <div id="intro" class="hud-panel interactive">
            <div class="title">JOJOLI 3D</div>
            <p style="font-size:0.8rem; color:#aaa;">MOBILE & PC COMPATIBLE</p>
            <button class="btn" onclick="app.startSystem()">START SYSTEM</button>
        </div>

        <!-- Menu -->
        <div id="menu" class="hud-panel interactive hidden">
            <div class="title">LOBBY</div>
            <button class="btn" onclick="app.createRoom()">CREATE ROOM</button>
            <input type="text" id="join-code" placeholder="ENTER CODE">
            <button class="btn" onclick="app.joinRoom()">JOIN ROOM</button>
        </div>

        <!-- Room Panel -->
        <div id="room-panel" class="hud-panel interactive hidden">
            <div class="title" id="room-status-text">WAITING...</div>
            <h1 id="room-code-display" style="font-family:'Orbitron'; font-size:2.5rem; margin:10px 0; color:var(--neon-purple);">------</h1>
            <p style="font-size:0.7rem; color:#888;">Open this file in a second tab to join.</p>
            
            <div id="host-upload" class="hidden">
                <hr style="border-color:#333">
                <p>UPLOAD .NES ROM</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.handleRom(this)">
                <button class="btn" onclick="document.getElementById('rom-file').click()">SELECT FILE</button>
            </div>
        </div>

        <!-- Game UI -->
        <div id="game-ui">
            <div class="top-bar">
                <div id="p1-status">P1: YOU</div>
                <div id="room-code-mini"></div>
                <div id="p2-status">P2: WAITING</div>
            </div>
            
            <div style="position:absolute; top:40px; width:100%; text-align:center; font-size:0.8rem; color:#aaa; background:rgba(0,0,0,0.5);">
                <span id="pc-hint">P1: Arrows+ZX | P2: WASD+FG | </span>
                <span id="mobile-hint">USE ON-SCREEN BUTTONS</span>
            </div>

            <!-- Touch Controls (Visible on Mobile) -->
            <div id="mobile-controls">
                <div class="control-zone">
                    <div class="d-pad-container">
                        <div class="touch-btn d-up" ontouchstart="app.touch('up', 1, true)" ontouchend="app.touch('up', 1, false)">▲</div>
                        <div class="touch-btn d-left" ontouchstart="app.touch('left', 1, true)" ontouchend="app.touch('left', 1, false)">◀</div>
                        <div class="touch-btn d-center"></div>
                        <div class="touch-btn d-right" ontouchstart="app.touch('right', 1, true)" ontouchend="app.touch('right', 1, false)">▶</div>
                        <div class="touch-btn d-down" ontouchstart="app.touch('down', 1, true)" ontouchend="app.touch('down', 1, false)">▼</div>
                    </div>
                    <div class="meta-btns">
                        <div class="touch-btn btn-sel" ontouchstart="app.touch('select', 1, true)" ontouchend="app.touch('select', 1, false)">SEL</div>
                        <div class="touch-btn btn-st" ontouchstart="app.touch('start', 1, true)" ontouchend="app.touch('start', 1, false)">STA</div>
                    </div>
                </div>

                <div class="control-zone">
                    <div class="ab-container">
                        <div class="touch-btn btn-b" ontouchstart="app.touch('b', 1, true)" ontouchend="app.touch('b', 1, false)">B</div>
                        <div class="touch-btn btn-a" ontouchstart="app.touch('a', 1, true)" ontouchend="app.touch('a', 1, false)">A</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CHANNEL = 'jojoli_mobile_v1';

        class App {
            constructor() {
                this.scene = null; this.camera = null; this.renderer = null;
                this.screenMesh = null; this.screenTexture = null;
                this.nes = null;
                
                this.network = new BroadcastChannel(CHANNEL);
                this.isHost = false;
                this.roomCode = null;
                this.romData = null;
                this.p2Connected = false;
                
                this.initThree();
                this.animate();
                this.network.onmessage = (e) => this.handleNetwork(e.data);
                
                window.addEventListener('keydown', e => this.handleKey(e, true));
                window.addEventListener('keyup', e => this.handleKey(e, false));
            }

            initThree() {
                const container = document.getElementById('world');
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000000, 0.02);

                // Responsive Camera
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                this.camera.position.z = 4;
                this.camera.position.y = 0;

                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize for mobile
                container.appendChild(this.renderer.domElement);

                // TV Setup
                const canvas = document.getElementById('nes-canvas');
                this.screenTexture = new THREE.CanvasTexture(canvas);
                this.screenTexture.minFilter = THREE.NearestFilter;
                this.screenTexture.magFilter = THREE.NearestFilter;

                const screenGeo = new THREE.PlaneGeometry(3.8, 2.85); // 4:3 Aspect
                const screenMat = new THREE.MeshBasicMaterial({ map: this.screenTexture });
                this.screenMesh = new THREE.Mesh(screenGeo, screenMat);
                this.scene.add(this.screenMesh);

                // Simple Frame Glow (Simulated with a plane behind)
                const glowGeo = new THREE.PlaneGeometry(4, 3);
                const glowMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.z = -0.01;
                this.screenMesh.add(glow);

                // Lights
                this.scene.add(new THREE.AmbientLight(0x404040));
                const pl = new THREE.PointLight(0x00f3ff, 1.5, 20);
                pl.position.set(5,2,5);
                this.scene.add(pl);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth/window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                // Idle rotation
                this.screenMesh.rotation.y = Math.sin(Date.now() * 0.0005) * 0.1;
                this.renderer.render(this.scene, this.camera);
            }

            // --- APP LOGIC ---

            startSystem() {
                document.getElementById('intro').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
            }

            createRoom() {
                this.isHost = true;
                this.roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
                this.updateUI('room-panel');
                document.getElementById('room-code-display').innerText = this.roomCode;
                document.getElementById('host-upload').classList.remove('hidden');
                document.getElementById('room-code-mini').innerText = this.roomCode;
            }

            joinRoom() {
                const code = document.getElementById('join-code').value.toUpperCase();
                if(!code) return;
                this.isHost = false;
                this.roomCode = code;
                this.updateUI('room-panel');
                document.getElementById('room-status-text').innerText = "CONNECTING...";
                document.getElementById('room-code-display').innerText = code;
                document.getElementById('p2-status').innerText = "P2: YOU";
                this.network.postMessage({ type: 'JOIN', code: code });
            }

            updateUI(screenId) {
                document.querySelectorAll('.hud-panel').forEach(el => el.classList.add('hidden'));
                document.getElementById(screenId).classList.remove('hidden');
            }

            // --- NES & FULLSCREEN ---

            handleRom(input) {
                const file = input.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.romData = e.target.result;
                    this.startGame(this.romData);
                    if(this.p2Connected) this.network.postMessage({ type: 'ROM', data: this.romData });
                };
                reader.readAsArrayBuffer(file);
            }

            startGame(romData) {
                this.enterFullScreen();
                document.getElementById('room-panel').classList.add('hidden');
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('exit-fs').style.display = 'block';

                // Align screen center for game
                this.screenMesh.rotation.y = 0;
                this.screenMesh.position.z = 0;

                const canvas = document.getElementById('nes-canvas');
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(256, 240);

                this.nes = new jsnes.NES({
                    onFrame: (buffer) => {
                        const data = imgData.data;
                        for(let i=0; i<buffer.length; i++) {
                            const col = buffer[i];
                            data[i*4] = col & 0xFF;
                            data[i*4+1] = (col>>8) & 0xFF;
                            data[i*4+2] = (col>>16) & 0xFF;
                            data[i*4+3] = 0xFF;
                        }
                        ctx.putImageData(imgData, 0, 0);
                        if(this.screenTexture) this.screenTexture.needsUpdate = true;

                        if(this.isHost && this.p2Connected) {
                            createImageBitmap(canvas).then(bmp => {
                                this.network.postMessage({ type: 'FRAME', bmp: bmp }, [bmp]);
                            });
                        }
                    },
                    onAudioSample: () => {}
                });

                this.nes.loadROM(romData);
                this.loop();
            }

            loop() {
                if(!this.nes) return;
                this.nes.frame();
                requestAnimationFrame(() => this.loop());
            }

            enterFullScreen() {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(e => console.log("Fullscreen blocked", e));
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                }
            }

            exitFullScreen() {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }

            // --- INPUTS (KEYBOARD + TOUCH) ---

            // Unified input handler
            sendInput(player, btn, isPressed) {
                // Visual feedback (optional implementation for touch buttons)
                // For now, direct NES injection
                if(this.nes) {
                    if(isPressed) this.nes.buttonDown(player, btn);
                    else this.nes.buttonUp(player, btn);
                }
                
                // Network Sync (If we are P2, send to Host)
                if(!this.isHost && player === 2) {
                    this.network.postMessage({ type: 'INPUT', btn: btn, pressed: isPressed });
                }
            }

            // Touch Handler
            touch(action, player, isDown) {
                // Map touch actions to NES buttons
                let btn = null;
                switch(action) {
                    case 'up': btn = jsnes.Controller.BUTTON_UP; break;
                    case 'down': btn = jsnes.Controller.BUTTON_DOWN; break;
                    case 'left': btn = jsnes.Controller.BUTTON_LEFT; break;
                    case 'right': btn = jsnes.Controller.BUTTON_RIGHT; break;
                    case 'a': btn = jsnes.Controller.BUTTON_A; break;
                    case 'b': btn = jsnes.Controller.BUTTON_B; break;
                    case 'start': btn = jsnes.Controller.BUTTON_START; break;
                    case 'select': btn = jsnes.Controller.BUTTON_SELECT; break;
                }
                
                // Visual highlight for touch
                const el = event.target;
                if(isDown) el.classList.add('active');
                else el.classList.remove('active');

                if(btn) this.sendInput(player, btn, isDown);
            }

            // Keyboard Handler
            handleKey(e, isDown) {
                const k = e.key.toLowerCase();
                let btn = null;
                let player = 1;

                // P1 Mappings
                if(k === 'arrowleft') btn = jsnes.Controller.BUTTON_LEFT;
                if(k === 'arrowright') btn = jsnes.Controller.BUTTON_RIGHT;
                if(k === 'arrowup') btn = jsnes.Controller.BUTTON_UP;
                if(k === 'arrowdown') btn = jsnes.Controller.BUTTON_DOWN;
                if(k === 'z') btn = jsnes.Controller.BUTTON_A;
                if(k === 'x') btn = jsnes.Controller.BUTTON_B;
                if(k === 'enter') btn = jsnes.Controller.BUTTON_START;
                if(k === 'shift') btn = jsnes.Controller.BUTTON_SELECT;

                // P2 Mappings (If Host, local test. If Client, send to network)
                if(!btn) {
                    player = 2;
                    if(k === 'a') btn = jsnes.Controller.BUTTON_LEFT;
                    if(k === 'd') btn = jsnes.Controller.BUTTON_RIGHT;
                    if(k === 'w') btn = jsnes.Controller.BUTTON_UP;
                    if(k === 's') btn = jsnes.Controller.BUTTON_DOWN;
                    if(k === 'f') btn = jsnes.Controller.BUTTON_A;
                    if(k === 'g') btn = jsnes.Controller.BUTTON_B;
                    if(k === 'h') btn = jsnes.Controller.BUTTON_START;
                    if(k === 'j') btn = jsnes.Controller.BUTTON_SELECT;
                }

                if(btn) {
                    if(!this.isHost && player === 2) {
                        // Client sending P2 input
                        this.network.postMessage({ type: 'INPUT', btn: btn, pressed: isDown });
                    } else {
                        // Host inputs (P1) or Host testing P2
                        this.sendInput(player, btn, isDown);
                    }
                }
            }

            // --- NETWORK ---
            handleNetwork(data) {
                if(this.isHost) {
                    if(data.type === 'JOIN' && data.code === this.roomCode) {
                        this.p2Connected = true;
                        document.getElementById('p2-status').innerText = "P2: CONNECTED";
                        document.getElementById('p2-status').style.color = "#0f0";
                        this.network.postMessage({ type: 'ACCEPT' });
                        if(this.romData) this.network.postMessage({ type: 'ROM', data: this.romData });
                    }
                    else if(data.type === 'INPUT') {
                        if(this.nes) {
                            if(data.pressed) this.nes.buttonDown(2, data.btn);
                            else this.nes.buttonUp(2, data.btn);
                        }
                    }
                } else {
                    if(data.type === 'ACCEPT') {
                        document.getElementById('room-status-text').innerText = "CONNECTED";
                    }
                    if(data.type === 'ROM') {
                        this.startGame(data.data);
                    }
                    if(data.type === 'FRAME') {
                        const ctx = document.getElementById('nes-canvas').getContext('2d');
                        ctx.drawImage(data.bmp, 0, 0);
                        if(this.screenTexture) this.screenTexture.needsUpdate = true;
                    }
                }
            }
        }

        const app = new App();
    </script>
</body>
</html>
