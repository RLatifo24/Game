<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jojoli Online - Fixed Version</title>
    
    <!-- 1. PEERJS (Networking) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- 2. THREE.JS (3D Visuals) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 3. JSNES (Emulator Core) - Locked to specific stable version -->
    <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg: #050505;
            --glass: rgba(0, 0, 0, 0.95);
            --error: #ff3333;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body {
            margin: 0; overflow: hidden; background: var(--bg);
            font-family: 'Share Tech Mono', monospace; color: white;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* 3D World Layer */
        #world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* 2D Screen (Source) */
        #screen-container { display: none; z-index: 0; position: absolute; opacity: 0; pointer-events: none;}
        canvas#nes-canvas { display: block; width: 256px; height: 240px; image-rendering: pixelated; }

        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* Panels */
        .panel {
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 20px; text-align: center;
            max-width: 95%; width: 500px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0; text-transform: uppercase; font-size: 2rem; text-shadow: 0 0 10px var(--neon-blue); }
        
        .mode-btn {
            background: var(--neon-blue); color: black; border: none;
            padding: 15px; font-family: 'Orbitron'; font-size: 1.1rem; cursor: pointer;
            font-weight: bold; transition: 0.2s; text-transform: uppercase;
        }
        .mode-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-blue); }
        .mode-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        
        input {
            width: 100%; padding: 10px; background: #000; border: 1px solid #555;
            color: white; font-family: monospace; text-align: center; font-size: 1.1rem;
        }
        input:focus { outline: 1px solid var(--neon-blue); }

        /* Game UI */
        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon-blue);
            display: flex; justify-content: space-between; padding: 10px 20px;
            font-family: 'Orbitron'; font-size: 0.9rem; z-index: 20; pointer-events: auto;
        }

        /* On-screen Controls (Mobile) */
        #controls-layer {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 20;
        }
        @media (min-width: 1024px) { #controls-layer { opacity: 0.3; } /* Dim on desktop */ }

        .c-zone { pointer-events: auto; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .d-pad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .d-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #555; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border-radius: 4px;
        }
        .d-btn:active, .d-btn.pressed { background: var(--neon-blue); color: black; }
        
        .ab-btns { display: flex; gap: 20px; }
        .ab-btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--neon-pink); border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 10px var(--neon-pink);
        }
        .ab-btn:active, .ab-btn.pressed { transform: scale(0.9); background: white; }

        /* Helpers */
        .error-msg { color: var(--error); font-size: 0.9rem; margin-top: 5px; }
        .success-msg { color: #0f0; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- 3D World Container -->
    <div id="world"></div>
    
    <!-- Hidden Canvas (The Source) -->
    <div id="screen-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>

    <div id="ui-layer">
        <!-- Intro Panel -->
        <div id="intro" class="panel interactive">
            <h1>Jojoli Online</h1>
            <div id="peer-status" style="color:#aaa; font-size:0.9rem;">Initializing System...</div>
            <div id="lib-check" style="color:#aaa; font-size:0.8rem;">Checking Dependencies...</div>
            <hr style="border-color:#333; width:100%">
            <button class="mode-btn" id="btn-create" onclick="app.createRoom()" disabled>CREATE ROOM (HOST)</button>
            <button class="mode-btn" id="btn-join" onclick="app.showJoin()" disabled>JOIN ROOM (CLIENT)</button>
        </div>

        <!-- Host Panel -->
        <div id="create-panel" class="panel interactive hidden">
            <h1>HOST ROOM</h1>
            <p style="font-size:0.8rem; color:#ccc">Send this ID to Player 2:</p>
            <input type="text" id="my-id" readonly onclick="this.select()" style="font-size:1rem; cursor:pointer; color:var(--neon-blue); border-color:var(--neon-blue)">
            <div id="conn-status" class="error-msg">Waiting for Player 2...</div>
            
            <div id="host-controls" class="hidden">
                <hr style="border-color:#333">
                <p style="color:var(--neon-blue); font-weight:bold;">PLAYER 2 CONNECTED</p>
                <p>1. Select a .NES ROM file</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.fileSelected(this)">
                <button class="mode-btn" onclick="document.getElementById('rom-file').click()">UPLOAD & START</button>
            </div>
        </div>

        <!-- Join Panel -->
        <div id="join-panel" class="panel interactive hidden">
            <h1>JOIN GAME</h1>
            <p>Paste Host ID below:</p>
            <input type="text" id="host-id" placeholder="PASTE ID HERE">
            <button class="mode-btn" onclick="app.connectToHost()">CONNECT</button>
            <div id="join-status" style="margin-top:10px; font-size:0.8rem;"></div>
        </div>

        <!-- Gameplay UI -->
        <div id="game-ui">
            <div class="status-bar">
                <span id="p1-stat">P1 (HOST)</span>
                <span style="color:#00f3ff; text-shadow:0 0 5px #00f3ff">LIVE</span>
                <span id="p2-stat">P2 (CLIENT)</span>
            </div>

            <!-- Mobile Controls -->
            <div id="controls-layer">
                <div class="c-zone">
                    <div class="d-pad">
                        <div class="d-btn d-up" data-key="ArrowUp">▲</div>
                        <div class="d-btn d-left" data-key="ArrowLeft">◀</div>
                        <div class="d-btn d-right" data-key="ArrowRight">▶</div>
                        <div class="d-btn d-down" data-key="ArrowDown">▼</div>
                    </div>
                </div>
                <div class="c-zone">
                    <div class="ab-btns">
                        <div class="ab-btn" style="background:#d32f2f; box-shadow:0 0 10px #d32f2f" data-key="x">B</div>
                        <div class="ab-btn" data-key="z">A</div>
                    </div>
                </div>
            </div>
            <div style="position:absolute; bottom:10px; width:100%; text-align:center; color:#444; font-size:0.7rem; pointer-events:none;">
                P1: Arrows + Z/X | P2: WASD + F/G
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const C = { A:1, B:2, SEL:3, ST:4, U:5, D:6, L:7, R:8 };

        class JojoliApp {
            constructor() {
                this.isHost = false;
                this.nes = null;
                this.conn = null;
                this.romData = null;
                this.is3D = false;

                // 1. Dependency Check
                if(typeof Peer === 'undefined' || typeof THREE === 'undefined' || typeof jsnes === 'undefined') {
                    this.showError("CRITICAL: One or more libraries failed to load. Check your internet connection.");
                    return;
                }
                
                document.getElementById('lib-check').innerHTML = "<span style='color:#0f0'>Dependencies OK</span>";

                // 2. Init 3D World
                this.initGraphics();

                // 3. Init Network
                this.initPeerJS();

                // 4. Inputs
                this.bindInputs();
            }

            showError(msg) {
                const el = document.getElementById('peer-status');
                if(el) { el.innerHTML = msg; el.style.color = "var(--error)"; }
                console.error(msg);
            }

            initGraphics() {
                const cvs = document.getElementById('nes-canvas');
                // Try 3D
                try {
                    this.sc = new THREE.Scene();
                    this.cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                    this.cam.position.z = 3.5;
                    this.ren = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                    this.ren.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('world').appendChild(this.ren.domElement);
                    
                    this.tex = new THREE.CanvasTexture(cvs);
                    this.tex.minFilter = THREE.NearestFilter;
                    this.tex.magFilter = THREE.NearestFilter;
                    
                    // Create a slight curve to the screen for retro vibes
                    const geo = new THREE.PlaneGeometry(3.5, 2.6, 16, 16);
                    // Simple curvature effect (optional, keeping it flat for stability)
                    const mat = new THREE.MeshBasicMaterial({ map: this.tex });
                    this.screenMesh = new THREE.Mesh(geo, mat);
                    this.sc.add(this.screenMesh);
                    this.sc.add(new THREE.AmbientLight(1));
                    
                    this.is3D = true;
                    this.loop3D();
                } catch(e) {
                    console.warn("3D Init failed, falling back to 2D", e);
                }
            }

            loop3D() {
                if(!this.is3D) return;
                requestAnimationFrame(() => this.loop3D());
                // Add a subtle floating animation
                const time = Date.now() * 0.001;
                this.screenMesh.position.y = Math.sin(time) * 0.05;
                this.screenMesh.rotation.x = Math.sin(time * 0.5) * 0.02;
                this.ren.render(this.sc, this.cam);
            }

            initPeerJS() {
                document.getElementById('peer-status').innerText = "Connecting to PeerJS Server...";
                
                this.peer = new Peer(null, {
                    debug: 2
                });

                this.peer.on('open', (id) => {
                    console.log('My ID:', id);
                    document.getElementById('peer-status').innerText = "System Ready";
                    document.getElementById('peer-status').style.color = "#0f0";
                    document.getElementById('btn-create').disabled = false;
                    document.getElementById('btn-join').disabled = false;
                });

                this.peer.on('connection', (conn) => {
                    if(this.conn) {
                        conn.close(); // Only 1 player allowed per host for this demo
                        return;
                    }
                    this.setupConnection(conn);
                });

                this.peer.on('error', (err) => {
                    console.error(err);
                    let msg = "Connection Error";
                    if(err.type === 'peer-unavailable') msg = "Host ID not found";
                    if(err.type === 'network') msg = "Network Error. Check Internet.";
                    this.showError(msg);
                });
            }

            createRoom() {
                this.isHost = true;
                this.switchPanel('create-panel');
                document.getElementById('my-id').value = this.peer.id;
            }

            showJoin() {
                this.switchPanel('join-panel');
            }

            connectToHost() {
                const hostId = document.getElementById('host-id').value.trim();
                if(!hostId) {
                    alert("Please enter a Host ID");
                    return;
                }
                
                document.getElementById('join-status').innerText = "Connecting...";
                const conn = this.peer.connect(hostId, { reliable: true });
                this.setupConnection(conn);
            }

            setupConnection(conn) {
                this.conn = conn;
                
                this.conn.on('open', () => {
                    console.log("Connection Open");
                    if(this.isHost) {
                        document.getElementById('conn-status').innerText = "CONNECTED!";
                        document.getElementById('conn-status').className = "success-msg";
                        document.getElementById('host-controls').classList.remove('hidden');
                        document.getElementById('p2-stat').style.color = "#0f0";
                    } else {
                        this.switchPanel('game-ui');
                        document.getElementById('p1-stat').innerText = "P1 (HOST)";
                        document.getElementById('p2-stat').innerText = "P2 (YOU)";
                        document.getElementById('p2-stat').style.color = "var(--neon-blue)";
                    }
                });

                this.conn.on('data', (data) => this.handleData(data));

                this.conn.on('close', () => {
                    alert("Disconnected from Host");
                    location.reload();
                });

                this.conn.on('error', (err) => {
                    console.error("Connection Error", err);
                    if(!this.isHost) alert("Connection lost");
                });
            }

            send(data) {
                if(this.conn && this.conn.open) {
                    this.conn.send(data);
                }
            }

            handleData(data) {
                // --- HOST RECEIVES ---
                if(this.isHost) {
                    if(data.t === 'I') { // Input from Client
                        if(this.nes) {
                            if(data.d) this.nes.buttonDown(2, data.b);
                            else this.nes.buttonUp(2, data.b);
                        }
                    }
                } 
                // --- CLIENT RECEIVES ---
                else {
                    if(data.t === 'R') { // ROM (Base64 String)
                        console.log("Receiving ROM...");
                        this.loadRomFromBase64(data.d);
                    }
                    if(data.t === 'V') { // Video Frame (Bitmap)
                        const c = document.getElementById('nes-canvas').getContext('2d');
                        c.drawImage(data.b, 0, 0);
                        if(this.is3D && this.tex) this.tex.needsUpdate = true;
                    }
                }
            }

            // --- ROM HANDLING ---

            fileSelected(inp) {
                const f = inp.files[0];
                if(!f) return;

                // Size check (NES roms are small, but warn if huge)
                if(f.size > 2 * 1024 * 1024) { 
                    if(!confirm("This file is large for an NES ROM (" + (f.size/1024) + "KB). Continue?")) return;
                }

                const r = new FileReader();
                r.onload = e => {
                    const buffer = e.target.result;
                    // Convert to Base64 for safe transfer
                    const binary = '';
                    const bytes = new Uint8Array(buffer);
                    const len = bytes.byteLength;
                    for (let i = 0; i < len; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    const base64 = window.btoa(binary);
                    
                    this.romData = base64; // Store locally (already base64 now)
                    
                    // 1. Start Locally
                    this.loadRomFromBase64(base64);
                    
                    // 2. Send to Client
                    this.send({ t: 'R', d: base64 });
                };
                r.readAsArrayBuffer(f);
            }

            loadRomFromBase64(b64) {
                try {
                    // Decode Base64 -> Binary String -> Uint8Array
                    const binStr = window.atob(b64);
                    const len = binStr.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binStr.charCodeAt(i);
                    }
                    
                    this.startGame(bytes);
                } catch(err) {
                    console.error(err);
                    alert("Error decoding ROM. File might be corrupted.");
                }
            }

            startGame(romUint8Array) {
                // Hide all panels, show game UI
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById('game-ui').style.display = 'block';

                const cvs = document.getElementById('nes-canvas');
                const ctx = cvs.getContext('2d');
                // Create image data buffer
                const img = ctx.createImageData(256,240);

                this.nes = new jsnes.NES({
                    onFrame: (buffer) => {
                        const data = img.data;
                        const bufLen = buffer.length;
                        // JSNES returns a 32-bit int buffer (rgba packed)
                        // We need to expand it to 8-bit r,g,b,a for putImageData
                        let i = 0;
                        while(i < bufLen) {
                            const pixel = buffer[i++];
                            data[i*4]     = pixel & 0xFF;       // R
                            data[i*4 + 1] = (pixel >> 8) & 0xFF; // G
                            data[i*4 + 2] = (pixel >> 16) & 0xFF;// B
                            data[i*4 + 3] = 0xFF;               // A
                        }
                        ctx.putImageData(img, 0, 0);
                        
                        if(this.is3D && this.tex) this.tex.needsUpdate = true;

                        // Streaming Logic (Host Only)
                        if(this.isHost && this.conn && this.conn.open) {
                            // Create an ImageBitmap is faster than sending raw pixels
                            createImageBitmap(cvs).then(bmp => {
                                this.send({ t: 'V', b: bmp });
                            }).catch(e => console.log("Stream lag", e));
                        }
                    },
                    onAudioSample: () => {} // Audio omitted for simplicity in single file
                });

                try {
                    this.nes.loadROM(romUint8Array);
                    this.loop();
                } catch(e) {
                    alert("Invalid ROM File or ROM Header Error.");
                    console.error(e);
                }
            }

            loop() {
                if(this.nes) {
                    this.nes.frame();
                    requestAnimationFrame(()=>this.loop());
                }
            }

            // --- INPUT HANDLING ---
            
            // Map UI clicks to keys
            bindInputs() {
                // Touch/Mouse handling for on-screen buttons
                const buttons = document.querySelectorAll('.d-btn, .ab-btn');
                buttons.forEach(btn => {
                    const key = btn.dataset.key;
                    if(!key) return;

                    const handleDown = (e) => { e.preventDefault(); this.simulateKey(key, true); btn.classList.add('pressed'); };
                    const handleUp = (e) => { e.preventDefault(); this.simulateKey(key, false); btn.classList.remove('pressed'); };

                    btn.addEventListener('mousedown', handleDown);
                    btn.addEventListener('mouseup', handleUp);
                    btn.addEventListener('mouseleave', handleUp);
                    btn.addEventListener('touchstart', handleDown, {passive: false});
                    btn.addEventListener('touchend', handleUp, {passive: false});
                });

                // Keyboard handling
                window.addEventListener('keydown', e => this.simulateKey(e.key, true));
                window.addEventListener('keyup', e => this.simulateKey(e.key, false));
            }

            simulateKey(key, isDown) {
                // If we are the client (P2) and the game hasn't started, ignore inputs
                if(!this.isHost && !this.nes) return; 

                let btn = null;
                let player = 1;

                // Normalize key
                k = key.toLowerCase();

                // --- P1 CONTROLS (Host) ---
                // Arrows + Z/X
                if(k === 'arrowup') btn = C.U;
                if(k === 'arrowdown') btn = C.D;
                if(k === 'arrowleft') btn = C.L;
                if(k === 'arrowright') btn = C.R;
                if(k === 'z') btn = C.A;
                if(k === 'x') btn = C.B;
                if(k === 'enter') btn = C.ST;
                if(k === 'shift') btn = C.SEL;

                // --- P2 CONTROLS (Client) ---
                // WASD + F/G
                // If we are Host, we inject P2 inputs locally.
                // If we are Client, we send P2 inputs.
                if(!btn) {
                    player = 2;
                    if(k === 'w') btn = C.U;
                    if(k === 's') btn = C.D;
                    if(k === 'a') btn = C.L;
                    if(k === 'd') btn = C.R;
                    if(k === 'f') btn = C.A; // A Button
                    if(k === 'g') btn = C.B; // B Button
                    if(k === 'h') btn = C.ST;
                    if(k === 'j') btn = C.SEL;
                }

                if(btn) {
                    this.handleInput(player, btn, isDown);
                }
            }

            handleInput(playerIndex, button, isPressed) {
                // 1. Local Processing
                if(this.nes) {
                    if(isPressed) this.nes.buttonDown(playerIndex, button);
                    else this.nes.buttonUp(playerIndex, button);
                }

                // 2. Network Processing (Only Client sends inputs)
                if(!this.isHost && playerIndex === 2) {
                    this.send({ t: 'I', b: button, d: isPressed });
                }
            }
            
            switchPanel(id) {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            }
        }

        // Initialize App once DOM is ready
        window.addEventListener('DOMContentLoaded', () => {
            window.app = new JojoliApp();
        });

    </script>
</body>
</html>
