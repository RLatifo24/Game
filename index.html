<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOJOLI 3D - ROBUST NET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff00;
            --bg: #050505;
            --glass: rgba(0, 0, 0, 0.95);
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body {
            margin: 0; overflow: hidden; background: var(--bg);
            font-family: 'Share Tech Mono', monospace; color: white;
            height: 100vh; width: 100vw;
        }

        #world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* PANELS */
        .panel {
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 20px; text-align: center;
            max-width: 95%; width: 480px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0 0 10px 0; text-transform: uppercase; }
        h2 { font-size: 0.9rem; color: #aaa; margin: 0; }
        
        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #555;
            color: white; font-family: 'Orbitron'; text-align: center; font-size: 1.2rem;
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        .btn {
            background: var(--neon-blue); color: black; border: none; padding: 15px;
            width: 100%; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            text-transform: uppercase; font-size: 1.1rem; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .btn:active { transform: scale(0.98); }
        .btn-sec { background: #333; color: white; }

        /* WARNINGS */
        .warn-box {
            background: rgba(255,0,0,0.1); border: 1px solid red;
            color: #ff9999; padding: 10px; font-size: 0.7rem; text-align: left;
        }

        /* DEBUG CONSOLE */
        #debug-box {
            background: #000; border: 1px solid #444; height: 120px; overflow-y: auto;
            padding: 5px; font-size: 0.7rem; text-align: left; color: #aaa; 
            font-family: monospace; width: 100%; box-sizing: border-box;
        }
        .log-msg { margin: 2px 0; border-bottom: 1px solid #111; }
        .log-sys { color: yellow; }
        .log-err { color: #ff5555; }
        .log-ok { color: #55ff55; }

        /* GAME HUD */
        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; padding: 10px 20px;
            font-family: 'Orbitron'; font-size: 0.9rem;
        }
        .p-status { color: #555; font-weight: bold; }
        .p-status.on { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        /* CONTROLS */
        #controls-layer {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none;
        }
        @media (min-width: 1024px) { #controls-layer { display: none; } }

        .c-zone { pointer-events: auto; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .d-pad {
            display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px;
        }
        .d-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
        }
        .d-btn:active { background: var(--neon-blue); }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }

        .ab-btns { display: flex; gap: 20px; align-items: flex-end; }
        .ab-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--neon-pink); border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem;
        }
        .ab-btn:active { transform: scale(0.9); }
        
        .meta-btns { display: flex; gap: 20px; }
        .m-btn {
            background: #333; border: 1px solid #777; padding: 10px 20px; border-radius: 5px; font-size: 0.8rem;
        }
        .m-btn.start { border-color: #0f0; color: #0f0; }

        #nes-canvas { display: none; }
    </style>
</head>
<body>

    <div id="world"></div>
    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <div id="ui-layer">
        <!-- Intro -->
        <div id="intro" class="panel interactive">
            <h1>Jojoli 3D</h1>
            <h2>ROBUST CONNECTION EDITION</h2>
            <button class="btn" onclick="app.init()">SYSTEM START</button>
        </div>

        <!-- Menu -->
        <div id="menu" class="panel interactive hidden">
            <h1>Lobby</h1>
            <button class="btn" onclick="app.createRoom()">CREATE ROOM</button>
            <input type="text" id="join-code" placeholder="ENTER FRIEND CODE">
            <button class="btn btn-sec" onclick="app.joinRoom()">JOIN ROOM</button>
            <div class="warn-box">
                ⚠️ TIMEOUT FIX: <br>
                1. Do NOT use Incognito/Private mode.<br>
                2. Use the SAME Browser for both tabs (e.g. Chrome + Chrome).
            </div>
        </div>

        <!-- Room -->
        <div id="room" class="panel interactive hidden">
            <h1 id="room-title">Waiting</h1>
            <h2 id="room-code" style="color:var(--neon-pink); letter-spacing:5px; margin:5px 0;">------</h2>
            
            <div style="width:100%; text-align:left; font-size:0.7rem; color:#888;">NETWORK LOG:</div>
            <div id="debug-box"></div>

            <div id="host-area" class="hidden" style="width:100%; border-top:1px solid #333; padding-top:10px;">
                <p style="color:#aaa; font-size:0.8rem;">1. UPLOAD ROM</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.fileSelected(this)">
                <button class="btn btn-sec" onclick="document.getElementById('rom-file').click()">SELECT FILE</button>
                
                <div id="start-area" class="hidden">
                    <br>
                    <button class="btn" style="background:#0f0; color:black;" onclick="app.launchGame()">START GAME NOW</button>
                </div>
            </div>
        </div>

        <!-- Game -->
        <div id="game-ui">
            <div class="status-bar">
                <span id="p1-stat" class="p-status on">P1: HOST</span>
                <span id="room-code-mini">------</span>
                <span id="p2-stat" class="p-status">P2: OFFLINE</span>
            </div>

            <div id="controls-layer">
                <!-- Left -->
                <div class="c-zone">
                    <div class="d-pad">
                        <div class="d-btn d-up" onmousedown="app.btn(1, 5, true)" onmouseup="app.btn(1, 5, false)" ontouchstart="app.btn(1, 5, true)" ontouchend="app.btn(1, 5, false)">▲</div>
                        <div class="d-btn d-left" onmousedown="app.btn(1, 7, true)" onmouseup="app.btn(1, 7, false)" ontouchstart="app.btn(1, 7, true)" ontouchend="app.btn(1, 7, false)">◀</div>
                        <div class="d-btn d-right" onmousedown="app.btn(1, 8, true)" onmouseup="app.btn(1, 8, false)" ontouchstart="app.btn(1, 8, true)" ontouchend="app.btn(1, 8, false)">▶</div>
                        <div class="d-btn d-down" onmousedown="app.btn(1, 6, true)" onmouseup="app.btn(1, 6, false)" ontouchstart="app.btn(1, 6, true)" ontouchend="app.btn(1, 6, false)">▼</div>
                    </div>
                    <div class="meta-btns">
                        <div class="m-btn" onmousedown="app.btn(1, 3, true)" onmouseup="app.btn(1, 3, false)" ontouchstart="app.btn(1, 3, true)" ontouchend="app.btn(1, 3, false)">SELECT</div>
                        <div class="m-btn start" onmousedown="app.btn(1, 4, true)" onmouseup="app.btn(1, 4, false)" ontouchstart="app.btn(1, 4, true)" ontouchend="app.btn(1, 4, false)">START</div>
                    </div>
                </div>

                <!-- Right -->
                <div class="c-zone">
                    <div class="ab-btns">
                        <div class="ab-btn" style="background:#d32f2f" onmousedown="app.btn(1, 2, true)" onmouseup="app.btn(1, 2, false)" ontouchstart="app.btn(1, 2, true)" ontouchend="app.btn(1, 2, false)">B</div>
                        <div class="ab-btn" onmousedown="app.btn(1, 1, true)" onmouseup="app.btn(1, 1, false)" ontouchstart="app.btn(1, 1, true)" ontouchend="app.btn(1, 1, false)">A</div>
                    </div>
                </div>
            </div>
            
            <div style="position:absolute; bottom: 110px; width:100%; text-align:center; color:#666; font-size:0.8rem;" id="pc-hint">
                P1: Arrows+ZX | P2: WASD+FG
            </div>
        </div>
    </div>

    <script>
        const C = { A:1, B:2, SEL:3, ST:4, U:5, D:6, L:7, R:8 };
        const LS_KEY = 'jojoli_net_msg'; // Key for LocalStorage fallback

        class Jojoli {
            constructor() {
                this.isHost = false;
                this.nes = null;
                this.romData = null;
                this.p2 = false;
                this.code = null;

                // --- ROBUST NETWORK INIT ---
                // 1. BroadcastChannel (Standard)
                this.bc = new BroadcastChannel('jojoli_v3');
                this.bc.onmessage = e => this.onMsg(e.data);

                // 2. LocalStorage (Fallback for strict environments)
                window.addEventListener('storage', (e) => {
                    if(e.key === LS_KEY && e.newValue) {
                        try {
                            const data = JSON.parse(e.newValue);
                            this.onMsg(data);
                            // Clear immediately to prevent re-triggering stale messages
                            localStorage.removeItem(LS_KEY); 
                        } catch(err) {}
                    }
                });

                // 3D Setup
                this.sc = new THREE.Scene();
                this.cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                this.cam.position.z = 3.5;
                this.ren = new THREE.WebGLRenderer({ alpha: true });
                this.ren.setSize(window.innerWidth, window.innerHeight);
                document.getElementById('world').appendChild(this.ren.domElement);
                
                const cvs = document.getElementById('nes-canvas');
                this.tex = new THREE.CanvasTexture(cvs);
                this.tex.minFilter = THREE.NearestFilter;
                this.sc.add(new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.6), new THREE.MeshBasicMaterial({ map: this.tex })));
                this.sc.add(new THREE.AmbientLight(1));
                
                this.loop3D();
                
                window.addEventListener('keydown', e => this.key(e.key, true));
                window.addEventListener('keyup', e => this.key(e.key, false));
            }

            // --- ROBUST SENDER ---
            send(data) {
                const str = JSON.stringify(data);
                // Try BroadcastChannel
                try { this.bc.postMessage(data); } catch(e) { console.log("BC Fail"); }
                // Try LocalStorage
                try { localStorage.setItem(LS_KEY, str); } catch(e) { console.log("LS Fail"); }
            }

            log(txt, type='sys') {
                const box = document.getElementById('debug-box');
                if(box) {
                    const d = document.createElement('div');
                    d.className = 'log-msg log-' + type;
                    const time = new Date().toLocaleTimeString().split(' ')[0];
                    d.innerText = `[${time}] ${txt}`;
                    box.prepend(d);
                    if(box.children.length > 15) box.lastChild.remove();
                }
                console.log(`[${type}] ${txt}`);
            }

            init() {
                document.getElementById('intro').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
                this.log("System Ready. Dual-Channel Net Active.");
            }

            createRoom() {
                this.isHost = true;
                this.code = Math.random().toString(36).substr(2,6).toUpperCase();
                this.showRoom();
                document.getElementById('host-area').classList.remove('hidden');
                document.getElementById('room-code-mini').innerText = this.code;
                this.log("Created Room: " + this.code);
                this.log("Listening via BC & LS...");
            }

            joinRoom() {
                const c = document.getElementById('join-code').value.toUpperCase();
                if(!c) { this.log("Error: No code entered", "err"); return; }
                this.isHost = false;
                this.code = c;
                this.showRoom();
                this.log("Joining: " + c);
                
                this.send({ t: 'J', c: c });
                this.log("Sent Dual-Channel Request...", "ok");
                
                setTimeout(() => {
                    if(!this.p2 && !this.isHost) {
                        this.log("TIMEOUT. Ensure tabs are in SAME browser (Chrome+Chrome) and NOT Incognito.", "err");
                    }
                }, 6000);
            }

            showRoom() {
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('room').classList.remove('hidden');
                document.getElementById('room-code').innerText = this.code;
            }

            fileSelected(inp) {
                const f = inp.files[0];
                if(!f) return;
                const r = new FileReader();
                r.onload = e => {
                    this.romData = e.target.result;
                    document.getElementById('start-area').classList.remove('hidden');
                    this.log("ROM Loaded.", "ok");
                };
                r.readAsArrayBuffer(f);
            }

            launchGame() {
                const el = document.documentElement;
                if(el.requestFullscreen) el.requestFullscreen().catch(e=>{});

                document.getElementById('room').classList.add('hidden');
                document.getElementById('game-ui').style.display = 'block';

                const cvs = document.getElementById('nes-canvas');
                const ctx = cvs.getContext('2d');
                const img = ctx.createImageData(256,240);

                this.nes = new jsnes.NES({
                    onFrame: buf => {
                        const d = img.data;
                        for(let i=0;i<buf.length;i++) {
                            const c = buf[i];
                            d[i*4]=c&0xFF; d[i*4+1]=(c>>8)&0xFF; d[i*4+2]=(c>>16)&0xFF; d[i*4+3]=0xFF;
                        }
                        ctx.putImageData(img,0,0);
                        this.tex.needsUpdate = true;

                        if(this.isHost && this.p2) {
                            createImageBitmap(cvs).then(b => {
                                this.send({ t: 'V', b: b }); // Note: Can't transfer in LS, but BC handles it
                            });
                        }
                    },
                    onAudioSample: ()=>{}
                });
                this.nes.loadROM(this.romData);
                this.loop();
                
                if(this.p2) this.send({ t: 'R', d: this.romData }); // ROM data large, might fail LS, but BC handles
            }

            loop() {
                if(this.nes) {
                    this.nes.frame();
                    requestAnimationFrame(()=>this.loop());
                }
            }

            loop3D() {
                requestAnimationFrame(()=>this.loop3D());
                this.ren.render(this.sc, this.cam);
            }

            btn(p, b, d) {
                this.inp(p, b, d);
                if(!this.isHost && p===2) this.send({ t:'I', b:b, d:d });
                if(this.isHost && p===2) this.log("P2 Input: " + b, "ok");
            }

            inp(p, b, d) {
                if(this.nes) {
                    if(d) this.nes.buttonDown(p, b);
                    else this.nes.buttonUp(p, b);
                }
            }

            key(k, d) {
                let b=null, pl=1;
                k=k.toLowerCase();
                if(k==='arrowleft') b=C.L; if(k==='arrowright') b=C.R;
                if(k==='arrowup') b=C.U; if(k==='arrowdown') b=C.D;
                if(k==='z') b=C.A; if(k==='x') b=C.B;
                if(k==='enter') b=C.ST; if(k==='shift') b=C.SEL;
                if(!b) {
                    pl=2;
                    if(k==='a') b=C.L; if(k==='d') b=C.R;
                    if(k==='w') b=C.U; if(k==='s') b=C.D;
                    if(k==='f') b=C.A; if(k==='g') b=C.B;
                    if(k==='h') b=C.ST; if(k==='j') b=C.SEL;
                }
                if(b) this.btn(pl, b, d);
            }

            onMsg(d) {
                this.log("Received: " + d.t);
                
                if(this.isHost) {
                    if(d.t==='J') {
                        this.log("Join Req: " + d.c);
                        if(d.c===this.code) {
                            this.p2 = true;
                            const s = document.getElementById('p2-stat');
                            s.classList.add('on');
                            s.innerText = "P2: ONLINE";
                            
                            this.log("P2 CONNECTED!", "ok");
                            this.send({ t: 'A' });
                            if(this.romData) this.send({ t: 'R', d: this.romData });
                        } else {
                            this.log("Code Mismatch", "err");
                        }
                    }
                    if(d.t==='I') this.inp(2, d.b, d.d);
                } else {
                    if(d.t==='A') {
                        this.log("Host Accepted", "ok");
                        document.getElementById('room-title').innerText = "CONNECTED";
                        document.getElementById('room-title').style.color = "#0f0";
                    }
                    if(d.t==='R') {
                        this.log("ROM Received", "ok");
                        this.launchGame();
                    }
                    if(d.t==='V') {
                        const c = document.getElementById('nes-canvas').getContext('2d');
                        c.drawImage(d.b,0,0);
                        this.tex.needsUpdate = true;
                    }
                }
            }
        }
        const app = new Jojoli();
    </script>
</body>
</html>
