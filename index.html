<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jojoli Online - Force Relay</title>
    
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsnes@1.2.1/dist/jsnes.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --bg: #050505;
            --glass: rgba(20, 20, 20, 0.98);
            --green: #00ff00;
            --red: #ff0000;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            margin: 0; overflow: hidden; background: var(--bg);
            font-family: 'Share Tech Mono', monospace; color: white;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        #world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #screen-container { display: none; }
        canvas#nes-canvas { display: block; width: 256px; height: 240px; }
        video#remote-video { display: none; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        .panel {
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 25px; text-align: center;
            max-width: 90%; width: 450px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 12px;
        }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0; text-transform: uppercase; font-size: 1.4rem; }
        
        .mode-btn {
            background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 12px; font-family: 'Orbitron'; font-size: 1rem; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .mode-btn:hover { background: var(--neon-blue); color: black; }
        .mode-btn:disabled { border-color: #333; color: #333; cursor: wait; }
        
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #444;
            color: white; font-family: monospace; text-align: center; font-size: 1.1rem; letter-spacing: 2px;
        }

        .status-box {
            background: #111; padding: 8px; border: 1px solid #333; font-size: 0.8rem; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .led { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .led.on { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .led.wait { background: var(--neon-blue); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .log-text { font-size: 0.8rem; min-height: 1.2em; color: #aaa; margin-top: 5px; }

        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; padding: 8px 15px;
            font-family: 'Orbitron'; font-size: 0.8rem; z-index: 20;
        }

        #controls-layer {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; z-index: 20;
        }
        @media (min-width: 1024px) { #controls-layer { opacity: 0.3; } }

        .c-zone { pointer-events: auto; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; gap: 4px; }
        .d-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #444; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
        }
        .d-btn:active, .d-btn.pressed { background: var(--neon-blue); color: black; }
        
        .ab-btns { display: flex; gap: 15px; }
        .ab-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: #d32f2f; border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem;
        }
        .ab-btn:active, .ab-btn.pressed { transform: scale(0.9); background: white; }
    </style>
</head>
<body>

    <div id="world"></div>
    <div id="screen-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>
    <video id="remote-video" autoplay playsinline muted></video>

    <div id="ui-layer">
        <!-- Intro -->
        <div id="intro" class="panel interactive">
            <h1>JOJOLI LINK</h1>
            
            <div class="status-box">
                <span>Signaling</span>
                <div id="led-sig" class="led"></div>
            </div>
            <div class="status-box">
                <span>Relay Mode</span>
                <div id="led-relay" class="led wait"></div>
            </div>
            
            <hr style="border-color:#222; width:100%">
            
            <button class="mode-btn" id="btn-create" onclick="app.createRoom()" disabled>HOST GAME</button>
            <button class="mode-btn" id="btn-join" onclick="app.showJoin()" disabled>JOIN GAME</button>
            
            <div id="intro-log" class="log-text">Initializing...</div>
        </div>

        <!-- Host -->
        <div id="create-panel" class="panel interactive hidden">
            <h1>HOST MODE</h1>
            <div class="status-box">
                <span>Relay Active</span>
                <div class="led on"></div>
            </div>
            <p style="font-size:0.8rem; color:#888">Send this code to P2:</p>
            <input type="text" id="my-id" readonly onclick="this.select()">
            
            <div id="host-controls" class="hidden">
                <div style="color:var(--green); margin-bottom:10px;">CONNECTED</div>
                <p>Load ROM (.nes):</p>
                <input type="file" id="rom-file" accept=".nes" style="display:none" onchange="app.fileSelected(this)">
                <button class="mode-btn" onclick="document.getElementById('rom-file').click()">SELECT FILE</button>
            </div>
        </div>

        <!-- Join -->
        <div id="join-panel" class="panel interactive hidden">
            <h1>CLIENT MODE</h1>
            <div class="status-box">
                <span>Relay Active</span>
                <div class="led on"></div>
            </div>
            <p style="font-size:0.8rem; color:#888">Paste Host Code:</p>
            <input type="text" id="host-id" placeholder="XXXX-XXXX-XXXX" autocomplete="off">
            
            <button class="mode-btn" onclick="app.connectToHost()" id="btn-connect">CONNECT</button>
            
            <div id="join-log" class="log-text">Waiting for ID...</div>
        </div>

        <!-- Game -->
        <div id="game-ui">
            <div class="status-bar">
                <span>P1 (HOST)</span>
                <span style="color:#00f3ff">RELAY LINK</span>
                <span>P2 (CLIENT)</span>
            </div>
            <div id="controls-layer">
                <div class="c-zone">
                    <div class="d-pad">
                        <div class="d-btn d-up" data-key="ArrowUp">▲</div>
                        <div class="d-btn d-left" data-key="ArrowLeft">◀</div>
                        <div class="d-btn d-right" data-key="ArrowRight">▶</div>
                        <div class="d-btn d-down" data-key="ArrowDown">▼</div>
                    </div>
                </div>
                <div class="c-zone">
                    <div class="ab-btns">
                        <div class="ab-btn" data-key="x">B</div>
                        <div class="ab-btn" style="background:var(--neon-blue); color:black" data-key="z">A</div>
                    </div>
                </div>
            </div>
            <div style="position:absolute; bottom:5px; width:100%; text-align:center; color:#333; font-size:0.7rem;">
                P1: Arrows+ZX | P2: WASD+FG
            </div>
        </div>
    </div>

    <script>
        const C = { A:1, B:2, SEL:3, ST:4, U:5, D:6, L:7, R:8 };

        class JojoliApp {
            constructor() {
                this.isHost = false;
                this.nes = null;
                this.conn = null;
                this.call = null;
                this.romData = null;
                this.is3D = false;

                if(typeof Peer === 'undefined') {
                    this.log("PeerJS Blocked", "intro-log");
                    return;
                }

                this.initGraphics();
                this.initPeerJS();
                this.bindInputs();
            }

            log(msg, id) {
                const el = document.getElementById(id);
                if(el) el.innerText = msg;
                console.log(msg);
            }

            initGraphics() {
                const cvs = document.getElementById('nes-canvas');
                try {
                    this.sc = new THREE.Scene();
                    this.cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
                    this.cam.position.z = 3.5;
                    this.ren = new THREE.WebGLRenderer({ alpha: true });
                    this.ren.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('world').appendChild(this.ren.domElement);
                    this.tex = new THREE.CanvasTexture(cvs);
                    this.tex.minFilter = THREE.NearestFilter;
                    this.sc.add(new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.6), new THREE.MeshBasicMaterial({ map: this.tex })));
                    this.sc.add(new THREE.AmbientLight(1));
                    this.is3D = true;
                    this.loop3D();
                } catch(e) {}
            }

            loop3D() {
                requestAnimationFrame(() => this.loop3D());
                if(!this.isHost) {
                    const vid = document.getElementById('remote-video');
                    if(vid.readyState === 4) {
                        const cvs = document.getElementById('nes-canvas');
                        cvs.getContext('2d').drawImage(vid, 0, 0, 256, 240);
                        if(this.tex) this.tex.needsUpdate = true;
                    }
                } else {
                    if(this.tex) this.tex.needsUpdate = true;
                }
                if(this.ren) this.ren.render(this.sc, this.cam);
            }

            initPeerJS() {
                // FORCE RELAY CONFIGURATION
                // This bypasses firewalls by routing ALL traffic through the TURN server.
                const peerConfig = {
                    debug: 1,
                    config: {
                        iceTransportPolicy: 'relay', // THE KEY FIX: Force relay, no direct P2P
                        iceServers: [
                            // Turn server (OpenRelay) - The relay path
                            { 
                                urls: 'turn:openrelay.metered.ca:443', 
                                username: 'openrelayproject', 
                                credential: 'openrelayproject' 
                            },
                            // Fallback STUN just in case
                            { urls: 'stun:stun.l.google.com:19302' }
                        ]
                    }
                };

                this.peer = new Peer(null, peerConfig);

                this.peer.on('open', (id) => {
                    this.log("Ready", "intro-log");
                    document.getElementById('led-sig').className = 'led on';
                    document.getElementById('led-relay').className = 'led on'; // Relay ready
                    document.getElementById('btn-create').disabled = false;
                    document.getElementById('btn-join').disabled = false;
                });

                this.peer.on('disconnected', () => {
                    this.log("Server Disconnected", "intro-log");
                    if(this.isHost) alert("Lost connection to relay server.");
                });

                this.peer.on('connection', (conn) => this.setupConnection(conn));

                this.peer.on('call', (call) => {
                    call.answer();
                    call.on('stream', (s) => {
                        const vid = document.getElementById('remote-video');
                        vid.srcObject = s;
                        vid.play();
                    });
                    this.call = call;
                });

                this.peer.on('error', (err) => {
                    console.error(err);
                    const btn = document.getElementById('btn-connect');
                    if(btn) {
                        btn.disabled = false;
                        btn.innerText = "RETRY";
                    }
                    if(err.type === 'peer-unavailable') {
                        this.log("Host ID not found.", "join-log");
                    } else {
                        this.log("Network Error: " + err.type, "join-log");
                    }
                });
            }

            createRoom() {
                this.isHost = true;
                this.switchPanel('create-panel');
                document.getElementById('my-id').value = this.peer.id;
            }

            showJoin() {
                this.switchPanel('join-panel');
            }

            connectToHost() {
                let id = document.getElementById('host-id').value.trim().replace(/\s/g, '');
                if(!id) return alert("Enter ID");
                
                const btn = document.getElementById('btn-connect');
                btn.disabled = true;
                btn.innerText = "CONNECTING (45s)...";
                this.log("Connecting via Relay...", "join-log");
                
                const conn = this.peer.connect(id, { 
                    reliable: true,
                    serialization: 'json' 
                });
                
                this.setupConnection(conn);
            }

            setupConnection(conn) {
                this.conn = conn;
                
                // Increased timeout for Relay negotiation (slower than P2P)
                const timeout = setTimeout(() => {
                    if(!this.conn.open) {
                        alert("RELAY FAILED.\n\nYour network is blocking even the Relay Server.\n\nPLEASE TRY USING A MOBILE HOTSPAT.");
                        const btn = document.getElementById('btn-connect');
                        if(btn) {
                            btn.disabled = false;
                            btn.innerText = "RETRY";
                        }
                        this.log("Relay Blocked", "join-log");
                    }
                }, 45000);

                conn.on('open', () => {
                    clearTimeout(timeout);
                    this.log("Relay Connected!", "join-log");
                    if(!this.isHost) {
                        this.switchPanel('game-ui');
                    }
                });

                conn.on('data', (d) => {
                    if(this.isHost && d.t === 'I' && this.nes) {
                        d.d ? this.nes.buttonDown(2, d.b) : this.nes.buttonUp(2, d.b);
                    } else if(!this.isHost && d.t === 'R') {
                        this.loadRom(d.d);
                    }
                });

                conn.on('close', () => {
                    alert("Disconnected");
                    location.reload();
                });
            }

            fileSelected(inp) {
                const f = inp.files[0];
                if(!f) return;
                const r = new FileReader();
                r.onload = e => {
                    const buf = e.target.result;
                    let bin = "";
                    const u8 = new Uint8Array(buf);
                    for(let i=0;i<u8.length;i++) bin += String.fromCharCode(u8[i]);
                    const b64 = btoa(bin);
                    this.romData = b64;
                    this.loadRom(b64);
                    this.conn.send({ t:'R', d:b64 });
                };
                r.readAsArrayBuffer(f);
            }

            loadRom(b64) {
                try {
                    const bin = atob(b64);
                    const u8 = new Uint8Array(bin.length);
                    for(let i=0;i<bin.length;i++) u8[i] = bin.charCodeAt(i);
                    this.startGame(u8);
                } catch(e) { alert("ROM Error"); }
            }

            startGame(rom) {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById('game-ui').style.display = 'block';

                const cvs = document.getElementById('nes-canvas');
                const ctx = cvs.getContext('2d');
                const img = ctx.createImageData(256,240);

                this.nes = new jsnes.NES({
                    onFrame: buf => {
                        const d = img.data;
                        for(let i=0;i<buf.length;i++) {
                            const c = buf[i];
                            d[i*4]=c&0xFF; d[i*4+1]=(c>>8)&0xFF; d[i*4+2]=(c>>16)&0xFF; d[i*4+3]=255;
                        }
                        ctx.putImageData(img,0,0);
                        if(this.isHost && this.conn && this.conn.open && !this.call) {
                            // Lower FPS for Relay stability
                            this.call = this.peer.call(this.conn.peer, cvs.captureStream(20));
                        }
                    },
                    onAudioSample: ()=>{}
                });
                this.nes.loadROM(rom);
                this.loop();
            }

            loop() {
                if(this.nes) { this.nes.frame(); requestAnimationFrame(()=>this.loop()); }
            }

            bindInputs() {
                document.querySelectorAll('.d-btn, .ab-btn').forEach(b => {
                    const k = b.dataset.key;
                    const d = e => { e.preventDefault(); this.key(k, true); b.classList.add('pressed'); };
                    const u = e => { e.preventDefault(); this.key(k, false); b.classList.remove('pressed'); };
                    b.addEventListener('mousedown', d); b.addEventListener('mouseup', u);
                    b.addEventListener('touchstart', d, {passive:false}); b.addEventListener('touchend', u);
                });
                window.addEventListener('keydown', e => this.key(e.key, true));
                window.addEventListener('keyup', e => this.key(e.key, false));
            }

            key(k, d) {
                let btn=null, pl=1;
                k=k.toLowerCase();
                if(k==='arrowup') btn=C.U; if(k==='arrowdown') btn=C.D;
                if(k==='arrowleft') btn=C.L; if(k==='arrowright') btn=C.R;
                if(k==='z') btn=C.A; if(k==='x') btn=C.B;
                if(!btn) { pl=2; if(k==='w') btn=C.U; if(k==='s') btn=C.D; if(k==='a') btn=C.L; if(k==='d') btn=C.R; if(k==='f') btn=C.A; if(k==='g') btn=C.B; }
                if(btn) {
                    if(this.nes) d?this.nes.buttonDown(pl,btn):this.nes.buttonUp(pl,btn);
                    if(!this.isHost && pl===2) this.conn.send({ t:'I', b:btn, d:d });
                }
            }

            switchPanel(id) {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            }
        }
        window.onload = () => window.app = new JojoliApp();
    </script>
</body>
</html>
